<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tip Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;padding:16px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.header a{color:#FF6B00;text-decoration:none;font-size:14px}
.header h1{font-size:20px;font-weight:700}
.header span{font-size:24px}
.container{max-width:500px;margin:0 auto}
.card{background:#16213e;border-radius:12px;padding:24px;border:1px solid #233554;margin-bottom:16px}
label{display:block;color:#888;font-size:13px;margin-bottom:6px}
input[type=number],input[type=text]{width:100%;padding:12px;background:#0f0f23;border:1px solid #233554;border-radius:8px;color:#fff;font-size:18px;font-family:'Inter',sans-serif;margin-bottom:16px}
input:focus{outline:none;border-color:#FF6B00}
input[type=range]{width:100%;margin:8px 0;accent-color:#FF6B00}
.presets{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.preset-btn{background:#233554;border:2px solid transparent;color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-size:14px;transition:all .15s}
.preset-btn:hover,.preset-btn.active{border-color:#FF6B00;background:#2d1a0a}
.results{display:grid;gap:12px}
.result-row{display:flex;justify-content:space-between;padding:12px;background:#0f0f23;border-radius:8px}
.result-row .label{color:#888}
.result-row .value{font-weight:700;color:#FF6B00;font-size:18px}
.result-row.total .value{font-size:24px}
.slider-label{display:flex;justify-content:space-between}
.toast{position:fixed;bottom:20px;right:20px;background:#FF6B00;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header"><a href="/">← Home</a><span>💰</span><h1>Tip Calculator</h1></div>
<div class="container">
<div class="card">
<label>Bill Amount</label>
<input type="number" id="bill" placeholder="0.00" min="0" step="0.01" oninput="calculate()">
<label>Tip Percentage</label>
<div class="slider-label"><span id="tipLabel">18%</span></div>
<input type="range" id="tipSlider" min="0" max="50" value="18" oninput="calculate()">
<div class="presets">
<button class="preset-btn" onclick="setTip(10)">10%</button>
<button class="preset-btn" onclick="setTip(15)">15%</button>
<button class="preset-btn active" onclick="setTip(18)">18%</button>
<button class="preset-btn" onclick="setTip(20)">20%</button>
<button class="preset-btn" onclick="setTip(25)">25%</button>
</div>
<label>Split Between</label>
<input type="number" id="split" value="1" min="1" max="100" oninput="calculate()">
</div>
<div class="card">
<div class="results">
<div class="result-row"><span class="label">Tip Amount</span><span class="value" id="tipAmt">$0.00</span></div>
<div class="result-row total"><span class="label">Total</span><span class="value" id="total">$0.00</span></div>
<div class="result-row"><span class="label">Per Person</span><span class="value" id="perPerson">$0.00</span></div>
</div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function setTip(pct){document.getElementById('tipSlider').value=pct;document.querySelectorAll('.preset-btn').forEach(b=>b.classList.toggle('active',parseInt(b.textContent)==pct));calculate()}
function calculate(){
const bill=parseFloat(document.getElementById('bill').value)||0;
const tipPct=parseInt(document.getElementById('tipSlider').value);
const split=Math.max(1,parseInt(document.getElementById('split').value)||1);
document.getElementById('tipLabel').textContent=tipPct+'%';
document.querySelectorAll('.preset-btn').forEach(b=>b.classList.toggle('active',parseInt(b.textContent)===tipPct));
const tipAmt=bill*tipPct/100;
const total=bill+tipAmt;
const perPerson=total/split;
document.getElementById('tipAmt').textContent='$'+tipAmt.toFixed(2);
document.getElementById('total').textContent='$'+total.toFixed(2);
document.getElementById('perPerson').textContent='$'+perPerson.toFixed(2);
}
calculate();
</script>
</body>
</html>
