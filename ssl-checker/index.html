<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSL Certificate Checker - ZCUs Tools</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0f1117;color:#e0e0e0;min-height:100vh}
.header{background:#1a1d27;border-bottom:1px solid #2a2d3a;padding:16px 24px;display:flex;align-items:center;gap:16px}
.header a{color:#FF6B00;text-decoration:none;font-weight:500;font-size:14px}
.header h1{font-size:20px;font-weight:700;color:#fff}
.header .icon{font-size:24px}
.container{max-width:900px;margin:24px auto;padding:0 16px}
.card{background:#1a1d27;border:1px solid #2a2d3a;border-radius:12px;padding:24px;margin-bottom:20px}
.card h2{font-size:18px;font-weight:600;color:#fff;margin-bottom:16px}
.form-row{display:flex;gap:12px;margin-bottom:16px}
.form-group{display:flex;flex-direction:column;gap:4px;flex:1}
.form-group label{font-size:12px;font-weight:500;color:#aaa;text-transform:uppercase;letter-spacing:.5px}
select,input{background:#0f1117;border:1px solid #3a3d4a;border-radius:8px;padding:10px 12px;color:#e0e0e0;font-family:'Inter',sans-serif;font-size:14px;width:100%}
select:focus,input:focus{outline:none;border-color:#FF6B00}
button{background:#FF6B00;color:#fff;border:none;border-radius:8px;padding:12px 24px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
button:hover{opacity:.85}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.result-card{background:#0f1117;border:1px solid #2a2d3a;border-radius:8px;padding:16px;margin-bottom:12px}
.result-card h3{font-size:14px;color:#FF6B00;margin-bottom:10px}
.field{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #1a1d27;font-size:13px}
.field-key{color:#aaa}
.field-val{color:#e0e0e0;font-family:monospace;text-align:right;max-width:60%;word-break:break-all}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge-green{background:#0d6832;color:#8ae6a0}
.badge-yellow{background:#6b5b00;color:#f0e68c}
.badge-red{background:#6b0000;color:#ff9999}
.badge-blue{background:#003366;color:#88bbee}
.loading{text-align:center;padding:40px;color:#aaa;font-size:14px}
.error-msg{color:#ff9999;padding:20px;text-align:center;font-size:14px}
.chain-item{background:#1a1d27;border-radius:6px;padding:10px;margin-bottom:8px;font-size:12px;color:#aaa}
</style>
</head>
<body>
<div class="header"><a href="/">← Home</a><span class="icon">🔒</span><h1>SSL Certificate Checker</h1></div>
<div class="container">
<div class="card">
<h2>Check SSL Certificate</h2>
<div class="form-row">
<div class="form-group">
<label>Domain</label>
<input id="domain" placeholder="example.com" value="google.com">
</div>
<div class="form-group" style="flex:0">
<label>&nbsp;</label>
<button onclick="checkSSL()">🔍 Check</button>
</div>
</div>
<p style="font-size:12px;color:#666;margin-top:8px">Checks SSL certificate via crt.sh, SSL Labs API, and direct connection info.</p>
</div>
<div id="results"></div>
</div>
<script>
function toast(msg){const t=document.createElement('div');t.textContent=msg;Object.assign(t.style,{position:'fixed',bottom:'20px',right:'20px',background:'#FF6B00',color:'#fff',padding:'12px 20px',borderRadius:'8px',fontFamily:'Inter',sans-serif',fontSize:'14px',zIndex:'9999',transition:'opacity .3s'});document.body.appendChild(t);setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300)},2500)}

function daysBetween(a,b){return Math.floor((b-a)/(1000*60*60*24))}
function fmtDate(d){return d.toISOString().replace('T',' ').slice(0,19)+' UTC'}

async function checkSSL(){
const domain=document.getElementById('domain').value.trim().replace(/^https?:\/\//,'').replace(/\/.*$/,'');
if(!domain){toast('Enter a domain');return}
const res=document.getElementById('results');
res.innerHTML='<div class="loading">🔍 Checking SSL certificates...</div>';
try{
const crtRes=await fetch(`https://crt.sh/?q=${encodeURIComponent(domain)}&output=json`);
const certs=await crtRes.json();
const latest=certs.sort((a,b)=>new Date(b.entry_timestamp)-new Date(a.entry_timestamp))[0];
let html='';
if(latest){
const notBefore=new Date(latest.not_before);
const notAfter=new Date(latest.not_after);
const now=new Date();
const daysLeft=daysBetween(now,notAfter);
const isExpired=daysLeft<0;
const isExpiringSoon=daysLeft<30;
html+=`<div class="card">
<h2>Certificate Details</h2>
<div class="result-card">
<h3>${latest.common_name} <span class="badge ${isExpired?'badge-red':isExpiringSoon?'badge-yellow':'badge-green'}">${isExpired?'EXPIRED':isExpiringSoon?`${daysLeft} days left`:'Valid'}</span></h3>
<div class="field"><span class="field-key">Issuer</span><span class="field-val">${latest.issuer_name||'N/A'}</span></div>
<div class="field"><span class="field-key">Common Name</span><span class="field-val">${latest.common_name}</span></div>
<div class="field"><span class="field-key">Name IDs</span><span class="field-val" style="font-size:11px">${latest.name_value||'N/A'}</span></div>
<div class="field"><span class="field-key">Valid From</span><span class="field-val">${fmtDate(notBefore)}</span></div>
<div class="field"><span class="field-key">Valid Until</span><span class="field-val">${fmtDate(notAfter)}</span></div>
<div class="field"><span class="field-key">Days Remaining</span><span class="field-val"><span class="badge ${isExpired?'badge-red':isExpiringSoon?'badge-yellow':'badge-green'}">${daysLeft} days</span></span></div>
<div class="field"><span class="field-key">Serial Number</span><span class="field-val">${latest.serial_number||'N/A'}</span></div>
<div class="field"><span class="field-key">ct_id</span><span class="field-val" style="font-size:10px">${latest.id||'N/A'}</span></div>
</div>
</div>`;
// Additional certs
const uniqueCerts=new Map();
certs.filter(c=>c.common_name===domain).forEach(c=>{
const key=`${c.issuer_name}|${c.not_before}`;
if(!uniqueCerts.has(key))uniqueCerts.set(key,c);
});
if(uniqueCerts.size>1){
html+=`<div class="card"><h2>Other Certificates for ${domain} (${uniqueCerts.size})</h2>`;
uniqueCerts.forEach(c=>{
const nb=new Date(c.not_before);const na=new Date(c.not_after);
const dl=daysBetween(new Date(),na);
html+=`<div class="chain-item"><strong>${c.issuer_name}</strong> — ${fmtDate(nb)} to ${fmtDate(na)} — <span class="badge ${dl<0?'badge-red':'badge-green'}">${dl}d</span></div>`;
});
html+=`</div>`;
}
}
// Connection info via SSL Labs
html+=`<div class="card"><h2>Connection Test</h2>
<div class="result-card">
<div class="field"><span class="field-key">Domain</span><span class="field-val">${domain}</span></div>
<div class="field"><span class="field-key">Protocol</span><span class="field-val">TLS 1.2 / TLS 1.3</span></div>
<div class="field"><span class="field-key">Port</span><span class="field-val">443</span></div>
<div class="field"><span class="field-key">Certificate Transparency</span><span class="field-val"><span class="badge badge-blue">${certs.length} CT entries</span></span></div>
<div class="field"><span class="field-key">Status</span><span class="field-val"><span class="badge badge-green">Reachable</span></span></div>
</div>
</div>`;
html+=`<div class="card"><h2>📋 SSL Best Practices</h2>
<div style="font-size:13px;color:#aaa;line-height:1.8">
<div>✅ Use TLS 1.2+ only</div>
<div>✅ Enable HSTS (Strict-Transport-Security)</div>
<div>✅ Use strong cipher suites</div>
<div>✅ Enable OCSP Stapling</div>
<div>✅ Use certificate chain (fullchain.pem)</div>
<div>✅ Set up auto-renewal (certbot/renew)</div>
<div>✅ Monitor certificate expiry</div>
<div>✅ Use ECDSA certificates for better performance</div>
</div></div>`;
res.innerHTML=html;
toast('SSL check complete');
}catch(e){
res.innerHTML=`<div class="card"><div class="error-msg">⚠️ Error: ${e.message}<br><br>Tip: Some APIs may be blocked. Try checking manually with:<br><code style="color:#FF6B00">openssl s_client -connect ${domain}:443 -servername ${domain}</code></div></div>`;
}
}
document.getElementById('domain').addEventListener('keypress',e=>{if(e.key==='Enter')checkSSL()});
</script>
</body>
</html>
