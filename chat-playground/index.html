<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Playground</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f5f5;color:#333;min-height:100vh}
.header{background:#fff;border-bottom:1px solid #e0e0e0;padding:16px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.header a{color:#FF6B00;text-decoration:none;font-weight:500;font-size:14px}
.header .icon{font-size:24px}
.header h1{font-size:18px;font-weight:600;flex:1}
.container{max-width:1000px;margin:0 auto;padding:24px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:24px;margin-bottom:20px}
.card h2{font-size:16px;font-weight:600;margin-bottom:16px}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;transition:all .2s}
.btn-primary{background:#FF6B00;color:#fff}.btn-primary:hover{background:#e55a00}
.btn-outline{background:transparent;border:1px solid #ddd;color:#555}.btn-outline:hover{border-color:#FF6B00;color:#FF6B00}
.btn-danger{background:#ff4444;color:#fff}.btn-danger:hover{background:#cc0000}
.btn-sm{padding:5px 10px;font-size:12px}
textarea,input[type=text],input[type=password],select{font-family:'Inter',sans-serif;font-size:14px;padding:10px 12px;border:1px solid #ddd;border-radius:8px;width:100%;outline:none;transition:border .2s}
textarea:focus,input:focus{border-color:#FF6B00}
label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#555}
.row{display:flex;gap:16px;flex-wrap:wrap}
.row>*{flex:1;min-width:200px}
.toast{position:fixed;bottom:24px;right:24px;background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.chat-area{min-height:400px;max-height:600px;overflow-y:auto;padding:16px;background:#fafafa;border-radius:8px;border:1px solid #eee;margin-bottom:16px}
.msg{margin-bottom:12px;padding:12px 16px;border-radius:12px;max-width:80%;font-size:14px;line-height:1.5;word-break:break-word;white-space:pre-wrap}
.msg-user{background:#FF6B00;color:#fff;margin-left:auto;border-bottom-right-radius:4px}
.msg-assistant{background:#fff;border:1px solid #eee;margin-right:auto;border-bottom-left-radius:4px}
.msg-system{background:#e8f4fd;border:1px solid #b3d9f2;margin-right:auto;font-style:italic}
.input-area{display:flex;gap:8px}
.input-area textarea{flex:1;min-height:60px;max-height:150px;resize:none}
.input-area button{align-self:flex-end;padding:12px 24px}
.typing{color:#999;font-style:italic;font-size:13px}
.flex-between{display:flex;justify-content:space-between;align-items:center}
.collapsible{cursor:pointer;user-select:none}
.collapsible h2{display:flex;align-items:center;gap:8px}
.collapsible h2::after{content:'▾';font-size:12px;color:#999}
.collapsible.collapsed h2::after{content:'▸'}
.collapsible.collapsed+.collapse-body{display:none}
</style>
</head>
<body>
<div class="header">
  <a href="/">← Home</a>
  <span class="icon">💬</span>
  <h1>Chat Playground</h1>
</div>
<div class="container">
  <div class="card collapsible" onclick="this.classList.toggle('collapsed')">
    <h2>⚙️ API Configuration</h2>
    <div class="collapse-body">
      <div class="row">
        <div><label>API Endpoint</label><input type="text" id="endpoint" value="https://api.openai.com/v1/chat/completions" placeholder="API URL"></div>
        <div><label>API Key</label><input type="password" id="apikey" placeholder="sk-..."></div>
        <div><label>Model</label><input type="text" id="model" value="gpt-3.5-turbo" placeholder="Model name"></div>
      </div>
      <div style="margin-top:12px"><label>System Prompt</label><textarea id="sysprompt" rows="2" placeholder="You are a helpful assistant.">You are a helpful assistant.</textarea></div>
      <div style="margin-top:8px;font-size:12px;color:#888">Configure any OpenAI-compatible API. Works with local models via Ollama, LM Studio, etc.</div>
    </div>
  </div>
  <div class="card">
    <div class="flex-between" style="margin-bottom:12px">
      <h2 style="margin:0">Conversation</h2>
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="exportChat()">📋 Export</button>
        <button class="btn btn-danger btn-sm" onclick="clearChat()">🗑 Clear</button>
      </div>
    </div>
    <div class="chat-area" id="chat"></div>
    <div class="input-area">
      <textarea id="user-input" placeholder="Type your message... (Enter to send, Shift+Enter for newline)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
      <button class="btn btn-primary" onclick="send()">Send</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let history=[];
let streaming=false;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function renderChat(){
  const el=document.getElementById('chat');
  if(!history.length){el.innerHTML='<div class="typing">No messages yet. Start a conversation!</div>';return}
  el.innerHTML=history.map(m=>`<div class="msg msg-${m.role}">${esc(m.content)}</div>`).join('');
  el.scrollTop=el.scrollHeight;
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
async function send(){
  const input=document.getElementById('user-input');
  const text=input.value.trim();
  if(!text||streaming)return;
  history.push({role:'user',content:text});
  input.value='';
  renderChat();
  streaming=true;
  const endpoint=document.getElementById('endpoint').value;
  const apikey=document.getElementById('apikey').value;
  const model=document.getElementById('model').value;
  const sysprompt=document.getElementById('sysprompt').value;
  const messages=[];
  if(sysprompt)messages.push({role:'system',content:sysprompt});
  history.forEach(m=>messages.push({role:m.role,content:m.content}));
  try{
    const resp=await fetch(endpoint,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+apikey},body:JSON.stringify({model,messages,stream:true})});
    if(!resp.ok)throw new Error(`HTTP ${resp.status}: ${await resp.text()}`);
    const reader=resp.body.getReader();
    const decoder=new TextDecoder();
    let assistantMsg={role:'assistant',content:''};
    history.push(assistantMsg);
    const el=document.getElementById('chat');
    let buffer='';
    while(true){
      const{done,value}=await reader.read();
      if(done)break;
      buffer+=decoder.decode(value,{stream:true});
      const lines=buffer.split('\n');
      buffer=lines.pop()||'';
      for(const line of lines){
        if(!line.startsWith('data: '))continue;
        const data=line.slice(6).trim();
        if(data==='[DONE]')continue;
        try{
          const json=JSON.parse(data);
          const delta=json.choices?.[0]?.delta?.content||'';
          assistantMsg.content+=delta;
          renderChat();
        }catch(e){}
      }
    }
    renderChat();
  }catch(e){
    const err={role:'assistant',content:'Error: '+e.message};
    history.push(err);
    renderChat();
    toast('Request failed');
  }
  streaming=false;
}
function clearChat(){history=[];renderChat()}
function exportChat(){
  const t=history.map(m=>`${m.role.toUpperCase()}: ${m.content}`).join('\n\n');
  navigator.clipboard.writeText(t);toast('Chat exported!');
}
renderChat();
</script>
</body>
</html>
