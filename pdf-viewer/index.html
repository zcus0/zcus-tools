<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PDF Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f5f5;min-height:100vh}
.header{background:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #FF6B00;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.header h1{font-size:1.3rem;color:#333;display:flex;align-items:center;gap:8px}
.header h1 .icon{font-size:1.5rem}
.header a{color:#FF6B00;text-decoration:none;font-weight:600;font-size:.9rem}
.header a:hover{text-decoration:underline}
.container{max-width:900px;margin:24px auto;padding:0 16px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:24px;margin-bottom:20px}
.drop-zone{border:3px dashed #ccc;border-radius:12px;padding:48px 24px;text-align:center;cursor:pointer;transition:.2s}
.drop-zone:hover,.drop-zone.dragover{border-color:#FF6B00;background:#fff5ed}
.drop-zone p{color:#888;font-size:1rem;margin-top:8px}
.drop-zone .big{font-size:3rem}
input[type=file]{display:none}
.controls{display:flex;gap:12px;align-items:center;justify-content:center;margin:16px 0;flex-wrap:wrap}
.controls button{background:#FF6B00;color:#fff;border:none;border-radius:8px;padding:8px 18px;cursor:pointer;font-family:inherit;font-weight:600;font-size:.9rem;transition:.2s}
.controls button:hover{background:#e55d00}
.controls button:disabled{opacity:.4;cursor:default}
.controls span{font-size:.95rem;color:#333;min-width:120px;text-align:center}
#pdf-canvas{max-width:100%;display:block;margin:0 auto;border:1px solid #eee;border-radius:4px}
.toast{position:fixed;bottom:24px;right:24px;background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:.9rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header">
  <h1><span class="icon">📄</span> PDF Viewer</h1>
  <a href="/">← Home</a>
</div>
<div class="container">
  <div class="card">
    <div class="drop-zone" id="dropZone">
      <div class="big">📂</div>
      <p>Drop a PDF here or click to browse</p>
    </div>
    <input type="file" id="fileInput" accept=".pdf">
  </div>
  <div class="card" id="viewerCard" style="display:none">
    <div class="controls">
      <button id="prevBtn" disabled>← Prev</button>
      <span id="pageNum">Page 1 / 1</span>
      <button id="nextBtn" disabled>Next →</button>
    </div>
    <canvas id="pdf-canvas"></canvas>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
const dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput'),
  canvas=document.getElementById('pdf-canvas'),ctx=canvas.getContext('2d'),
  prevBtn=document.getElementById('prevBtn'),nextBtn=document.getElementById('nextBtn'),
  pageNumEl=document.getElementById('pageNum'),viewerCard=document.getElementById('viewerCard');
let pdf=null,currentPage=1,totalPages=0;

function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

dropZone.addEventListener('click',()=>fileInput.click());
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');if(e.dataTransfer.files.length)loadFile(e.dataTransfer.files[0])});
fileInput.addEventListener('change',e=>{if(e.target.files.length)loadFile(e.target.files[0])});

async function loadFile(file){
  try{
    const buf=await file.arrayBuffer();
    pdf=await pdfjsLib.getDocument({data:buf}).promise;
    totalPages=pdf.numPages;currentPage=1;
    viewerCard.style.display='block';
    renderPage();toast('PDF loaded: '+file.name);
  }catch(err){toast('Error: '+err.message)}
}

function updateControls(){
  pageNumEl.textContent=`Page ${currentPage} / ${totalPages}`;
  prevBtn.disabled=currentPage<=1;nextBtn.disabled=currentPage>=totalPages;
}

async function renderPage(){
  if(!pdf)return;
  const page=await pdf.getPage(currentPage);
  const vp=page.getViewport({scale:1.5});
  canvas.height=vp.height;canvas.width=vp.width;
  await page.render({canvasContext:ctx,viewport:vp}).promise;
  updateControls();
}

prevBtn.addEventListener('click',()=>{if(currentPage>1){currentPage--;renderPage()}});
nextBtn.addEventListener('click',()=>{if(currentPage<totalPages){currentPage++;renderPage()}});
</script>
</body></html>
