<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>JSON Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f5f5;min-height:100vh}
.header{background:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #FF6B00;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.header h1{font-size:1.3rem;color:#333;display:flex;align-items:center;gap:8px}
.header a{color:#FF6B00;text-decoration:none;font-weight:600;font-size:.9rem}
.container{max-width:1000px;margin:24px auto;padding:0 16px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:24px;margin-bottom:20px}
.card h2{font-size:1.1rem;color:#333;margin-bottom:12px}
textarea{width:100%;min-height:180px;border:2px solid #ddd;border-radius:8px;padding:12px;font-family:'Courier New',monospace;font-size:.85rem;resize:vertical;background:#fafafa}
textarea:focus{outline:none;border-color:#FF6B00}
.btn-row{display:flex;gap:10px;margin:12px 0;flex-wrap:wrap}
.btn{background:#FF6B00;color:#fff;border:none;border-radius:8px;padding:10px 20px;cursor:pointer;font-family:inherit;font-weight:600;font-size:.9rem;transition:.2s}
.btn:hover{background:#e55d00}
.btn.secondary{background:#666}
.tree{font-family:'Courier New',monospace;font-size:.85rem;line-height:1.8}
.tree-node{margin-left:20px}
.toggle{cursor:pointer;user-select:none;display:inline-flex;align-items:center;gap:4px}
.toggle:hover{color:#FF6B00}
.toggle .arrow{display:inline-block;width:14px;transition:transform .15s}
.toggle .arrow.open{transform:rotate(90deg)}
.key{color:#FF6B00;font-weight:600}
.str{color:#27ae60}
.num{color:#2980b9}
.bool{color:#8e44ad}
.null{color:#999;font-style:italic}
.bracket{color:#999}
.collapsed-info{color:#bbb;font-size:.8em}
.error{color:#e74c3c;font-weight:600;margin:8px 0}
.toast{position:fixed;bottom:24px;right:24px;background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:.9rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header">
  <h1>🌳 JSON Visualizer</h1>
  <a href="/">← Home</a>
</div>
<div class="container">
  <div class="card">
    <h2>Paste JSON</h2>
    <textarea id="jsonInput" placeholder='{"name":"Alice","age":30,"hobbies":["reading","coding"]}'></textarea>
    <div class="btn-row">
      <button class="btn" onclick="visualize()">Visualize</button>
      <button class="btn secondary" onclick="formatInput()">Format</button>
      <button class="btn secondary" onclick="document.getElementById('jsonInput').value=''">Clear</button>
    </div>
  </div>
  <div class="card">
    <h2>Tree View</h2>
    <div class="tree" id="treeOutput">Paste JSON and click Visualize</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
let idCounter=0;

function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function renderValue(val,depth=0){
  if(val===null)return'<span class="null">null</span>';
  if(typeof val==='boolean')return`<span class="bool">${val}</span>`;
  if(typeof val==='number')return`<span class="num">${val}</span>`;
  if(typeof val==='string')return`<span class="str">"${escapeHtml(val)}"</span>`;
  if(Array.isArray(val)){
    if(val.length===0)return'<span class="bracket">[]</span>';
    const id='n'+(idCounter++);
    const items=val.map((v,i)=>`<div class="tree-node">${renderValue(v,depth+1)}${i<val.length-1?',':''}</div>`).join('');
    return`<span class="toggle" onclick="toggle('${id}')"><span class="arrow open">▶</span><span class="bracket">[</span><span class="collapsed-info" style="display:none">${val.length} items...</span><span class="bracket close-br" data-id="${id}">]</span></span><div class="tree-children" id="${id}">${items}</div><span class="bracket close-br" data-id="${id}" style="margin-left:-1px">]</span>`;
  }
  if(typeof val==='object'){
    const keys=Object.keys(val);
    if(!keys.length)return'<span class="bracket">{}</span>';
    const id='n'+(idCounter++);
    const items=keys.map((k,i)=>`<div class="tree-node"><span class="key">"${escapeHtml(k)}"</span>: ${renderValue(val[k],depth+1)}${i<keys.length-1?',':''}</div>`).join('');
    return`<span class="toggle" onclick="toggle('${id}')"><span class="arrow open">▶</span><span class="bracket">{</span><span class="collapsed-info" style="display:none">${keys.length} keys...</span><span class="bracket close-br" data-id="${id}">}</span></span><div class="tree-children" id="${id}">${items}</div><span class="bracket close-br" data-id="${id}" style="margin-left:-1px">}</span>`;
  }
  return String(val);
}

function visualize(){
  idCounter=0;
  const raw=document.getElementById('jsonInput').value.trim();
  const out=document.getElementById('treeOutput');
  if(!raw){out.innerHTML='';toast('Enter JSON first');return}
  try{
    const data=JSON.parse(raw);
    out.innerHTML=renderValue(data);
    toast('JSON visualized!');
  }catch(e){out.innerHTML=`<div class="error">⚠️ Parse Error: ${escapeHtml(e.message)}</div>`;toast('Invalid JSON')}
}

function toggle(id){
  const el=document.getElementById(id);
  if(!el)return;
  const hidden=el.style.display!=='none';
  el.style.display=hidden?'none':'block';
  const arrow=el.previousElementSibling.querySelector('.arrow');
  const closeBr=document.querySelectorAll(`.close-br[data-id="${id}"]`);
  const info=el.previousElementSibling.querySelector('.collapsed-info');
  if(arrow){arrow.classList.toggle('open',!hidden);arrow.textContent='▶'}
  if(closeBr)closeBr.forEach(b=>b.style.display=hidden?'none':'inline');
  if(info)info.style.display=hidden?'inline':'none';
}

function formatInput(){
  try{
    const raw=document.getElementById('jsonInput').value.trim();
    document.getElementById('jsonInput').value=JSON.stringify(JSON.parse(raw),null,2);
    toast('Formatted!');
  }catch(e){toast('Invalid JSON')}
}
</script>
</body></html>
