<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Password Strength Analyzer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f5f5;color:#333}
.header{background:#fff;padding:16px 24px;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.header a{color:#FF6B00;text-decoration:none;font-weight:600}
.header h1{font-size:20px;font-weight:700}
.header .icon{font-size:24px}
.container{max-width:700px;margin:24px auto;padding:0 16px}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card h2{font-size:16px;font-weight:600;margin-bottom:12px}
.input-wrap{position:relative}
input[type=text],input[type=password]{width:100%;padding:14px;border:2px solid #e0e0e0;border-radius:8px;font-size:16px;font-family:'Inter'}
input:focus{outline:none;border-color:#FF6B00}
.toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px}
.meter{height:8px;background:#e0e0e0;border-radius:4px;margin:16px 0 8px;overflow:hidden}
.meter-fill{height:100%;border-radius:4px;transition:width .3s,background .3s}
.score-label{font-weight:700;font-size:18px;margin-bottom:16px}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.stat-item{background:#f8f8f8;border-radius:8px;padding:12px}
.stat-label{font-size:12px;color:#666;margin-bottom:4px}
.stat-value{font-size:14px;font-weight:600}
.detail-list{margin-top:12px}
.detail-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:6px;margin:4px 0}
.detail-item.pass{background:#e8f5e9}
.detail-item.warn{background:#fff3e0}
.detail-item.fail{background:#ffebee}
.detail-text{font-size:13px}
.check{font-size:16px}
.toast{position:fixed;bottom:24px;right:24px;background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:1000;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header"><a href="/">← Home</a><span class="icon">🔑</span><h1>Password Strength Analyzer</h1></div>
<div class="container">
<div class="card">
<h2>Enter Password</h2>
<div class="input-wrap">
<input type="password" id="pw" placeholder="Type your password..." oninput="analyze()">
<button class="toggle-pw" onclick="togglePw()">👁️</button>
</div>
<div class="meter"><div class="meter-fill" id="meterFill"></div></div>
<div class="score-label" id="scoreLabel">Enter a password</div>
</div>
<div class="card">
<h2>Analysis</h2>
<div class="stats-grid" id="stats"></div>
</div>
<div class="card">
<h2>Detailed Check</h2>
<div class="detail-list" id="details"></div>
</div>
</div>
<div id="toast" class="toast"></div>
<script>
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function togglePw(){const i=document.getElementById('pw');i.type=i.type==='password'?'text':'password'}
function calcEntropy(pw){
let pool=0;
if(/[a-z]/.test(pw))pool+=26;
if(/[A-Z]/.test(pw))pool+=26;
if(/[0-9]/.test(pw))pool+=10;
if(/[^a-zA-Z0-9]/.test(pw))pool+=32;
return pw.length*Math.log2(pool||1);
}
function crackTime(entropy){
const guessesPerSec=1e10;
const combinations=Math.pow(2,entropy);
const seconds=combinations/guessesPerSec/2;
if(seconds<1)return'Instant';
if(seconds<60)return Math.round(seconds)+'s';
if(seconds<3600)return Math.round(seconds/60)+'min';
if(seconds<86400)return Math.round(seconds/3600)+'hrs';
if(seconds<31536000)return Math.round(seconds/86400)+' days';
if(seconds<31536000*100)return Math.round(seconds/31536000)+' years';
if(seconds<31536000*1e6)return Math.round(seconds/31536000/1000)+'K years';
if(seconds<31536000*1e9)return Math.round(seconds/31536000/1e6)+'M years';
return Math.round(seconds/31536000/1e9)+'B+ years';
}
function analyze(){
const pw=document.getElementById('pw').value;
if(!pw){
document.getElementById('meterFill').style.width='0';
document.getElementById('meterFill').style.background='#e0e0e0';
document.getElementById('scoreLabel').textContent='Enter a password';
document.getElementById('stats').innerHTML='';
document.getElementById('details').innerHTML='';
return;
}
const entropy=calcEntropy(pw);
const checks=[
{label:'Length ≥ 8',pass:pw.length>=8},
{label:'Length ≥ 12',pass:pw.length>=12},
{label:'Length ≥ 16',pass:pw.length>=16},
{label:'Has lowercase',pass:/[a-z]/.test(pw)},
{label:'Has uppercase',pass:/[A-Z]/.test(pw)},
{label:'Has digits',pass:/[0-9]/.test(pw)},
{label:'Has special chars',pass:/[^a-zA-Z0-9]/.test(pw)},
{label:'No common patterns',pass:!/(123|abc|qwerty|password|admin|letmein|welcome|monkey|dragon)/i.test(pw)},
{label:'No repeated chars',pass:!/(.)\1{2,}/.test(pw)},
{label:'No sequential chars',pass:!/(abc|bcd|cde|def|efg|123|234|345|456|567|678|789)/i.test(pw)},
];
const passed=checks.filter(c=>c.pass).length;
let score=0;
if(entropy<25)score=0;
else if(entropy<40)score=1;
else if(entropy<60)score=2;
else if(entropy<80)score=3;
else score=4;
score=Math.min(4,Math.floor((passed/checks.length)*5));
const colors=['#e74c3c','#e67e22','#f1c40f','#2ecc71','#27ae60'];
const labels=['Very Weak','Weak','Fair','Strong','Very Strong'];
const pct=(score/4)*100;
document.getElementById('meterFill').style.width=pct+'%';
document.getElementById('meterFill').style.background=colors[score];
document.getElementById('scoreLabel').textContent=labels[score];
document.getElementById('scoreLabel').style.color=colors[score];
document.getElementById('stats').innerHTML=`
<div class="stat-item"><div class="stat-label">Entropy</div><div class="stat-value">${entropy.toFixed(1)} bits</div></div>
<div class="stat-item"><div class="stat-label">Crack Time</div><div class="stat-value">${crackTime(entropy)}</div></div>
<div class="stat-item"><div class="stat-label">Length</div><div class="stat-value">${pw.length} chars</div></div>
<div class="stat-item"><div class="stat-label">Character Pool</div><div class="stat-value">${(/[a-z]/.test(pw)?26:0)+(/[A-Z]/.test(pw)?26:0)+(/[0-9]/.test(pw)?10:0)+(/[^a-zA-Z0-9]/.test(pw)?32:0)} types</div></div>`;
document.getElementById('details').innerHTML=checks.map(c=>`<div class="detail-item ${c.pass?'pass':'fail'}"><span class="detail-text">${c.label}</span><span class="check">${c.pass?'✅':'❌'}</span></div>`).join('');
}
</script>
</body>
</html>
