<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;padding:16px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.header a{color:#FF6B00;text-decoration:none;font-size:14px}
.header h1{font-size:20px;font-weight:700}
.header span{font-size:24px}
.container{max-width:700px;margin:0 auto}
.card{background:#16213e;border-radius:12px;padding:24px;border:1px solid #233554;margin-bottom:16px}
.add-row{display:flex;gap:8px}
input{flex:1;padding:10px;background:#0f0f23;border:1px solid #233554;border-radius:8px;color:#fff;font-family:'Inter',sans-serif;font-size:14px}
input:focus{outline:none;border-color:#FF6B00}
.btn{padding:10px 16px;background:#FF6B00;border:none;color:#fff;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.btn:hover{background:#e65c00}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-secondary{background:#233554}
.habit-card{background:#0f0f23;border-radius:8px;padding:16px;margin-bottom:12px;border:1px solid #233554}
.habit-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.habit-name{font-weight:600;font-size:16px}
.habit-streak{color:#FF6B00;font-size:13px}
.heatmap{display:flex;flex-wrap:wrap;gap:3px}
.heat-day{width:14px;height:14px;border-radius:2px;cursor:pointer;transition:transform .1s}
.heat-day:hover{transform:scale(1.3)}
.heat-day.empty{background:#1a1a2e;border:1px solid #233554}
.heat-day.l0{background:#161b22}.heat-day.l1{background:#0e4429}.heat-day.l2{background:#006d32}.heat-day.l3{background:#26a641}.heat-day.l4{background:#39d353}
.stats-row{display:flex;gap:12px;margin-top:8px}
.stats-row .stat{font-size:12px;color:#888}
.stats-row .stat b{color:#FF6B00}
.legend{display:flex;gap:4px;align-items:center;margin-top:8px;font-size:11px;color:#555}
.legend .box{width:12px;height:12px;border-radius:2px}
.toast{position:fixed;bottom:20px;right:20px;background:#FF6B00;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header"><a href="/">← Home</a><span>✅</span><h1>Habit Tracker</h1></div>
<div class="container">
<div class="card">
<div class="add-row">
<input type="text" id="habitInput" placeholder="New habit..." onkeydown="if(event.key==='Enter')addHabit()">
<button class="btn" onclick="addHabit()">Add</button>
</div>
</div>
<div id="habitList"></div>
<div class="card">
<div class="legend"><span>Less</span><div class="box" style="background:#161b22"></div><div class="box" style="background:#0e4429"></div><div class="box" style="background:#006d32"></div><div class="box" style="background:#26a641"></div><div class="box" style="background:#39d353"></div><span>More</span></div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
let habits=JSON.parse(localStorage.getItem('habits')||'[]');
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function save(){localStorage.setItem('habits',JSON.stringify(habits))}
function addHabit(){const name=document.getElementById('habitInput').value.trim();if(!name){toast('Enter a habit');return}habits.push({id:Date.now(),name,completed:{}});document.getElementById('habitInput').value='';save();render();toast('Habit added')}
function toggleDay(habitId,date){const h=habits.find(x=>x.id===habitId);if(!h)return;h.completed[date]=!h.completed[date];save();render()}
function removeHabit(id){habits=habits.filter(x=>x.id!==id);save();render()}
function getStreak(h){
const today=new Date();let streak=0;let d=new Date(today);
while(true){const key=d.toISOString().split('T')[0];if(h.completed[key]){streak++;d.setDate(d.getDate()-1)}else break}
return streak}
function render(){
document.getElementById('habitList').innerHTML=habits.map(h=>{
const today=new Date();const days=90;const cells=[];
for(let i=days-1;i>=0;i--){const d=new Date(today);d.setDate(d.getDate()-i);const key=d.toISOString().split('T')[0];
const done=h.completed[key];cells.push(`<div class="heat-day ${done?'l3':'empty'}" onclick="toggleDay(${h.id},'${key}')" title="${key}"></div>`)}
const total=Object.values(h.completed).filter(Boolean).length;const streak=getStreak(h);
return`<div class="card"><div class="habit-header"><div class="habit-name">${h.name}</div><div><span class="habit-streak">🔥 ${streak} streak</span> <button class="btn btn-sm btn-secondary" onclick="removeHabit(${h.id})">✕</button></div></div><div class="heatmap">${cells.join('')}</div><div class="stats-row"><div class="stat">Total: <b>${total}</b> days</div><div class="stat">This month: <b>${Object.entries(h.completed).filter(([k,v])=>v&&k.startsWith(today.toISOString().slice(0,7))).length}</b></div></div></div>`}).join('')}
render();
</script>
</body>
</html>
