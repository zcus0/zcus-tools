<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Text Statistics</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f5f5;color:#333}
.header{background:#fff;padding:16px 24px;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.header a{color:#FF6B00;text-decoration:none;font-weight:600}
.header h1{font-size:20px;font-weight:700}
.header .icon{font-size:24px}
.container{max-width:900px;margin:24px auto;padding:0 16px}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card h2{font-size:16px;font-weight:600;margin-bottom:12px}
textarea{width:100%;height:150px;border:1px solid #e0e0e0;border-radius:8px;padding:12px;font-size:14px;resize:vertical;line-height:1.6}
textarea:focus{outline:2px solid #FF6B00;border-color:#FF6B00}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px}
.stat-card{background:#f8f8f8;border-radius:8px;padding:12px;text-align:center}
.stat-value{font-size:24px;font-weight:700;color:#FF6B00}
.stat-label{font-size:11px;color:#666;margin-top:4px}
.freq-list{max-height:300px;overflow-y:auto}
.freq-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.freq-word{font-weight:600;min-width:100px;font-family:monospace}
.freq-bar{height:6px;background:#FF6B00;border-radius:3px}
.freq-count{color:#666;min-width:40px;text-align:right}
.toast{position:fixed;bottom:24px;right:24px;background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:1000;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header"><a href="/">← Home</a><span class="icon">📊</span><h1>Text Statistics</h1></div>
<div class="container">
<div class="card">
<h2>Input Text</h2>
<textarea id="input" placeholder="Paste your text to analyze..." oninput="analyze()"></textarea>
</div>
<div class="card">
<h2>Overview</h2>
<div class="stats-grid" id="overview"></div>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
<div class="card">
<h2>Word Frequency (Top 20)</h2>
<div class="freq-list" id="wordFreq"></div>
</div>
<div class="card">
<h2>Character Frequency</h2>
<div class="freq-list" id="charFreq"></div>
</div>
</div>
<div class="card">
<h2>Reading Level</h2>
<div id="readingLevel"></div>
</div>
</div>
<div id="toast" class="toast"></div>
<script>
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function syllableCount(word){
word=word.toLowerCase().replace(/[^a-z]/g,'');
if(word.length<=3)return 1;
word=word.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/,'').replace(/^y/,'');
const m=word.match(/[aeiouy]{1,2}/g);
return m?m.length:1;
}
function analyze(){
const text=document.getElementById('input').value;
if(!text.trim()){
document.getElementById('overview').innerHTML='';
document.getElementById('wordFreq').innerHTML='';
document.getElementById('charFreq').innerHTML='';
document.getElementById('readingLevel').innerHTML='';
return;
}
// Overview
const chars=text.length;
const charsNoSpaces=text.replace(/\s/g,'').length;
const words=text.trim().split(/\s+/);
const wordCount=words.length;
const sentences=text.split(/[.!?]+/).filter(s=>s.trim()).length;
const paragraphs=text.split(/\n\s*\n/).filter(p=>p.trim()).length;
const avgWordLen=words.reduce((s,w)=>s+w.length,0)/wordCount;
const totalSyllables=words.reduce((s,w)=>s+syllableCount(w),0);
const avgSyllables=totalSyllables/wordCount;
// Longest/shortest words
const sorted=[...new Set(words.map(w=>w.toLowerCase().replace(/[^a-z]/g,'')))].filter(Boolean).sort((a,b)=>b.length-a.length);
const uniqueWords=new Set(words.map(w=>w.toLowerCase().replace(/[^a-z]/g,''))).size;
document.getElementById('overview').innerHTML=[
{label:'Characters',value:chars},{label:'Chars (no spaces)',value:charsNoSpaces},
{label:'Words',value:wordCount},{label:'Unique Words',value:uniqueWords},
{label:'Sentences',value:sentences},{label:'Paragraphs',value:paragraphs},
{label:'Avg Word Length',value:avgWordLen.toFixed(1)},{label:'Avg Syllables/Word',value:avgSyllables.toFixed(1)},
{label:'Longest Word',value:sorted[0]||'-'},{label:'Shortest Word',value:sorted[sorted.length-1]||'-'},
].map(s=>`<div class="stat-card"><div class="stat-value">${s.value}</div><div class="stat-label">${s.label}</div></div>`).join('');
// Word frequency
const stops=new Set(['the','a','an','is','are','was','were','be','been','being','have','has','had','do','does','did','will','would','shall','should','may','might','can','could','must','need','and','but','or','nor','for','yet','so','in','on','at','to','from','by','with','of','about','into','through','during','before','after','above','below','between','out','off','over','under','again','further','then','once','that','this','these','those','it','its','i','me','my','we','our','you','your','he','his','she','her','they','them','their','what','which','who','whom','how','when','where','why','not','no','nor','very','just','than','too','also','as','if','each','all','both','few','more','most','other','some','such','only','own','same']);
const wordFreq={};
words.forEach(w=>{const l=w.toLowerCase().replace(/[^a-z']/g,'');if(l.length>1)wordFreq[l]=(wordFreq[l]||0)+1});
const sortedWords=Object.entries(wordFreq).sort((a,b)=>b[1]-a[1]).slice(0,20);
const maxW=sortedWords[0]?sortedWords[0][1]:1;
document.getElementById('wordFreq').innerHTML=sortedWords.map(([w,c])=>`<div class="freq-item"><span class="freq-word">${w}</span><div class="freq-bar" style="width:${(c/maxW)*100}px"></div><span class="freq-count">${c}</span></div>`).join('')||'<div style="color:#999;font-size:13px;padding:12px">No words</div>';
// Char frequency
const charFreq={};[...text].forEach(c=>{if(c!=='\n'&&c!=='\r')charFreq[c]=(charFreq[c]||0)+1});
const sortedChars=Object.entries(charFreq).sort((a,b)=>b[1]-a[1]).slice(0,20);
const maxC=sortedChars[0]?sortedChars[0][1]:1;
document.getElementById('charFreq').innerHTML=sortedChars.map(([c,cnt])=>`<div class="freq-item"><span class="freq-word" style="font-size:16px">${c===' '?'(space)':c==='\\t'?'(tab)':c.replace(/</g,'&lt;')}</span><div class="freq-bar" style="width:${(cnt/maxC)*100}px"></div><span class="freq-count">${cnt}</span></div>`).join('');
// Reading level
const fkGrade=(0.39*wordCount/sentences+11.8*totalSyllables/wordCount-15.59);
const fkReading=Math.max(0,Math.min(100,206.835-1.015*wordCount/sentences-84.6*totalSyllables/wordCount));
let level,color;
if(fkReading>=90){level='Very Easy (5th grade)';color='#27ae60'}
else if(fkReading>=80){level='Easy (6th grade)';color='#2ecc71'}
else if(fkReading>=70){level='Fairly Easy (7th grade)';color='#f1c40f'}
else if(fkReading>=60){level='Standard (8th-9th grade)';color='#e67e22'}
else if(fkReading>=50){level='Fairly Difficult (10th-12th grade)';color='#e74c3c'}
else{level='Difficult (College+)';color='#c0392b'}
document.getElementById('readingLevel').innerHTML=`
<div style="display:flex;justify-content:space-between;margin-bottom:4px"><span>Flesch Reading Ease: <strong>${fkReading.toFixed(1)}</strong></span><span style="color:${color};font-weight:600">${level}</span></div>
<div style="height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden"><div style="height:100%;width:${fkReading}%;background:${color};border-radius:4px;transition:width .3s"></div></div>
<div style="margin-top:8px;font-size:13px;color:#666">Grade Level: <strong>${Math.max(0,fkGrade).toFixed(1)}</strong> · Total Syllables: <strong>${totalSyllables}</strong></div>
`;
}
analyze();
</script>
</body>
</html>
