<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stopwatch</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;padding:16px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.header a{color:#FF6B00;text-decoration:none;font-size:14px}
.header h1{font-size:20px;font-weight:700}
.header span{font-size:24px}
.container{max-width:500px;margin:0 auto}
.card{background:#16213e;border-radius:12px;padding:24px;border:1px solid #233554;margin-bottom:16px;text-align:center}
.time-display{font-size:56px;font-weight:700;font-variant-numeric:tabular-nums;margin:20px 0;color:#FF6B00}
.ms-display{font-size:24px;color:#888}
.btn-group{display:flex;gap:12px;justify-content:center;margin-top:16px}
.btn{padding:14px 28px;border:none;color:#fff;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.btn-primary{background:#FF6B00}.btn-primary:hover{background:#e65c00}
.btn-secondary{background:#233554}.btn-secondary:hover{background:#2d4a6f}
.btn-danger{background:#e74c3c}
.btn-success{background:#00b894}
.laps-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.laps-header h3{font-size:14px;color:#888}
.lap-list{max-height:300px;overflow-y:auto}
.lap-item{display:grid;grid-template-columns:40px 1fr 1fr;padding:10px;border-bottom:1px solid #233554;font-size:13px}
.lap-item.header{color:#888;font-weight:600}
.lap-item.fastest .lap-time{color:#00b894}
.lap-item.slowest .lap-time{color:#e74c3c}
.toast{position:fixed;bottom:20px;right:20px;background:#FF6B00;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header"><a href="/">← Home</a><span>⏱️</span><h1>Stopwatch</h1></div>
<div class="container">
<div class="card">
<div class="time-display"><span id="mainTime">00:00:00</span></div>
<div class="ms-display"><span id="msTime">.000</span></div>
<div class="btn-group">
<button class="btn btn-primary" id="startBtn" onclick="toggle()">Start</button>
<button class="btn btn-secondary" onclick="reset()">Reset</button>
<button class="btn btn-success" onclick="lap()" id="lapBtn" disabled>Lap</button>
<button class="btn btn-secondary" onclick="exportLaps()">Export</button>
</div>
</div>
<div class="card" id="lapsCard" style="display:none">
<div class="laps-header"><h3>Laps</h3><span id="lapCount" style="color:#888;font-size:12px"></span></div>
<div class="lap-item header"><div>#</div><div>Lap Time</div><div>Total</div></div>
<div class="lap-list" id="lapList"></div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
let running=false,start=0,elapsed=0,laps=[],lastLap=0,interval=null;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function fmtTime(ms){const h=Math.floor(ms/3600000),m=Math.floor(ms%3600000/60000),s=Math.floor(ms%60000/1000);return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')}
function fmtMs(ms){return'.'+String(ms%1000).padStart(3,'0')}
function update(){const t=running?Date.now()-start+elapsed:elapsed;document.getElementById('mainTime').textContent=fmtTime(t);document.getElementById('msTime').textContent=fmtMs(t)}
function toggle(){if(running){clearInterval(interval);elapsed+=Date.now()-start;running=false;document.getElementById('startBtn').textContent='Resume';document.getElementById('startBtn').className='btn btn-primary'}else{start=Date.now();running=true;interval=setInterval(update,10);document.getElementById('startBtn').textContent='Stop';document.getElementById('startBtn').className='btn btn-danger';document.getElementById('lapBtn').disabled=false}}
function reset(){clearInterval(interval);running=false;elapsed=0;lastLap=0;laps=[];update();document.getElementById('startBtn').textContent='Start';document.getElementById('startBtn').className='btn btn-primary';document.getElementById('lapBtn').disabled=true;document.getElementById('lapsCard').style.display='none'}
function lap(){if(!running)return;const t=Date.now()-start+elapsed;const lapTime=t-lastLap;lastLap=t;laps.push({time:lapTime,total:t});renderLaps()}
function renderLaps(){
if(!laps.length){document.getElementById('lapsCard').style.display='none';return}
document.getElementById('lapsCard').style.display='block';
document.getElementById('lapCount').textContent=laps.length+' laps';
const times=laps.map(l=>l.time);const fastest=Math.min(...times);const slowest=Math.max(...times);
document.getElementById('lapList').innerHTML=[...laps].reverse().map((l,i)=>{
const idx=laps.length-i;const cls=l.time===fastest&&laps.length>1?'fastest':l.time===slowest&&laps.length>1?'slowest':'';
return`<div class="lap-item ${cls}"><div>${idx}</div><div class="lap-time">${fmtTime(l.time)}${fmtMs(l.time)}</div><div>${fmtTime(l.total)}${fmtMs(l.total)}</div></div>`
}).join('')}
function exportLaps(){if(!laps.length){toast('No laps to export');return}const csv='Lap,Lap Time,Total Time\n'+laps.map((l,i)=>`${i+1},${fmtTime(l.time)}${fmtMs(l.time)},${fmtTime(l.total)}${fmtMs(l.total)}`).join('\n');
const b=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='laps.csv';a.click();toast('Laps exported')}
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();toggle()}if(e.code==='KeyL')lap()});
</script>
</body>
</html>
