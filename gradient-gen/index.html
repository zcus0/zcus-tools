<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gradient Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f5f5;color:#333;min-height:100vh}
.header{background:#fff;border-bottom:1px solid #e0e0e0;padding:16px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.header a{color:#FF6B00;text-decoration:none;font-weight:500;font-size:14px}
.header .icon{font-size:24px}
.header h1{font-size:18px;font-weight:600;flex:1}
.container{max-width:1000px;margin:0 auto;padding:24px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:24px;margin-bottom:20px}
.card h2{font-size:16px;font-weight:600;margin-bottom:16px}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;transition:all .2s}
.btn-primary{background:#FF6B00;color:#fff}.btn-primary:hover{background:#e55a00}
.btn-outline{background:transparent;border:1px solid #ddd;color:#555}.btn-outline:hover{border-color:#FF6B00;color:#FF6B00}
.btn-sm{padding:5px 10px;font-size:12px}
input[type=text],input[type=number],input[type=color],select{font-family:'Inter',sans-serif;font-size:14px;padding:8px 12px;border:1px solid #ddd;border-radius:8px;outline:none;transition:border .2s}
input:focus,select:focus{border-color:#FF6B00}
label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#555}
.toast{position:fixed;bottom:24px;right:24px;background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.preview{width:100%;height:300px;border-radius:12px;border:1px solid #eee;margin-bottom:16px}
.stop-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.stop-row input[type=color]{width:40px;height:36px;padding:2px;border-radius:6px;cursor:pointer}
.stop-row input[type=number]{width:70px}
.stop-row input[type=range]{flex:1;min-width:100px}
.code-block{background:#1e1e1e;color:#d4d4d4;padding:16px;border-radius:8px;font-family:'Fira Code',monospace;font-size:13px;overflow-x:auto;white-space:pre;position:relative;cursor:pointer}
.code-block:hover{background:#2a2a2a}
.copy-hint{position:absolute;top:8px;right:12px;font-size:11px;color:#888;font-family:'Inter',sans-serif}
.row{display:flex;gap:16px;flex-wrap:wrap}
.row>*{flex:1;min-width:200px}
</style>
</head>
<body>
<div class="header">
  <a href="/">← Home</a>
  <span class="icon">🌈</span>
  <h1>Gradient Generator</h1>
</div>
<div class="container">
  <div class="card">
    <h2>Preview</h2>
    <div class="preview" id="preview"></div>
  </div>
  <div class="card">
    <h2>Settings</h2>
    <div class="row">
      <div><label>Type</label>
        <select id="type" onchange="update()">
          <option value="linear">Linear</option>
          <option value="radial">Radial</option>
          <option value="conic">Conic</option>
        </select>
      </div>
      <div><label>Angle / Direction</label><input type="number" id="angle" value="45" min="0" max="360" oninput="update()"></div>
    </div>
  </div>
  <div class="card">
    <h2>Color Stops</h2>
    <div id="stops"></div>
    <div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn btn-primary btn-sm" onclick="addStop()">+ Add Stop</button>
      <button class="btn btn-outline btn-sm" onclick="randomGradient()">🎲 Random</button>
    </div>
  </div>
  <div class="card">
    <h2>CSS Code</h2>
    <div class="code-block" onclick="copyCSS()"><span class="copy-hint">Click to copy</span><code id="css-code"></code></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let stops=[{color:'#FF6B00',pos:0},{color:'#FFB800',pos:50},{color:'#FF6B00',pos:100}];
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function renderStops(){
  const el=document.getElementById('stops');
  el.innerHTML=stops.map((s,i)=>`
    <div class="stop-row">
      <input type="color" value="${s.color}" onchange="stops[${i}].color=this.value;update()">
      <input type="range" min="0" max="100" value="${s.pos}" oninput="stops[${i}].pos=+this.value;update()">
      <input type="number" min="0" max="100" value="${s.pos}" onchange="stops[${i}].pos=+this.value;update()">
      <span>%</span>
      <button class="btn btn-sm" style="background:#ff4444;color:#fff" onclick="stops.splice(${i},1);update()">✕</button>
    </div>
  `).join('');
}
function addStop(){stops.push({color:'#000000',pos:50});update()}
function buildCSS(){
  const sorted=[...stops].sort((a,b)=>a.pos-b.pos);
  const stopsStr=sorted.map(s=>`${s.color} ${s.pos}%`).join(', ');
  const type=document.getElementById('type').value;
  const angle=document.getElementById('angle').value;
  if(type==='linear')return`linear-gradient(${angle}deg, ${stopsStr})`;
  if(type==='radial')return`radial-gradient(circle, ${stopsStr})`;
  return`conic-gradient(from ${angle}deg, ${stopsStr})`;
}
function update(){
  renderStops();
  const css=buildCSS();
  document.getElementById('preview').style.background=css;
  document.getElementById('css-code').textContent=`background: ${css};`;
}
function copyCSS(){navigator.clipboard.writeText(document.getElementById('css-code').textContent);toast('Copied!')}
function randomGradient(){
  stops=[];
  const n=2+Math.floor(Math.random()*3);
  for(let i=0;i<n;i++){stops.push({color:'#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0'),pos:Math.round(100*i/(n-1))})}
  document.getElementById('angle').value=Math.round(Math.random()*360);
  update();
}
update();
</script>
</body>
</html>
