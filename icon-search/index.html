<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Icon Search</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f5f5;color:#333;min-height:100vh}
.header{background:#fff;border-bottom:1px solid #e0e0e0;padding:16px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.header a{color:#FF6B00;text-decoration:none;font-weight:500;font-size:14px}
.header .icon{font-size:24px}
.header h1{font-size:18px;font-weight:600;flex:1}
.container{max-width:1200px;margin:0 auto;padding:24px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:24px;margin-bottom:20px}
.card h2{font-size:16px;font-weight:600;margin-bottom:16px}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;transition:all .2s}
.btn-primary{background:#FF6B00;color:#fff}.btn-primary:hover{background:#e55a00}
.btn-outline{background:transparent;border:1px solid #ddd;color:#555}.btn-outline:hover{border-color:#FF6B00;color:#FF6B00}
.btn-sm{padding:5px 10px;font-size:12px}
input[type=text],input[type=color],select{font-family:'Inter',sans-serif;font-size:14px;padding:10px 12px;border:1px solid #ddd;border-radius:8px;outline:none;transition:border .2s}
input:focus{border-color:#FF6B00}
label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#555}
.toast{position:fixed;bottom:24px;right:24px;background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.icon-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px}
.icon-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 8px;border:1px solid #eee;border-radius:8px;cursor:pointer;transition:all .2s;font-size:11px;color:#666;text-align:center}
.icon-card:hover{border-color:#FF6B00;background:#fff5f0}
.icon-card svg{width:24px;height:24px}
.icon-card .name{word-break:break-all}
.controls{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.result-box{margin-top:16px;padding:16px;background:#f9f9f9;border-radius:8px;border:1px solid #eee}
.result-box pre{font-size:12px;overflow-x:auto;white-space:pre-wrap;word-break:break-all}
.count{font-size:12px;color:#999;margin-bottom:12px}
</style>
</head>
<body>
<div class="header">
  <a href="/">← Home</a>
  <span class="icon">🔍</span>
  <h1>Icon Search</h1>
</div>
<div class="container">
  <div class="card">
    <div class="controls">
      <div style="flex:2;min-width:200px"><label>Search Icons</label><input type="text" id="search" placeholder="Search... (e.g. home, user, settings)" oninput="filter()"></div>
      <div style="min-width:100px"><label>Size</label>
        <select id="size" onchange="filter()"><option value="16">16px</option><option value="20">20px</option><option value="24" selected>24px</option><option value="32">32px</option><option value="48">48px</option></select>
      </div>
      <div style="min-width:100px"><label>Color</label><input type="color" id="color" value="#333333" onchange="filter()"></div>
      <div style="flex:1"></div>
      <button class="btn btn-outline btn-sm" onclick="copyAllVisible()">📋 Copy All Visible</button>
    </div>
  </div>
  <div class="count" id="count"></div>
  <div class="icon-grid" id="grid"></div>
  <div class="card" id="detail" style="display:none">
    <h2>Selected Icon</h2>
    <div style="display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap">
      <div id="preview" style="padding:20px;background:#f9f9f9;border-radius:8px;border:1px solid #eee;min-width:100px;display:flex;align-items:center;justify-content:center"></div>
      <div style="flex:1;min-width:250px">
        <div id="icon-name" style="font-weight:600;margin-bottom:8px"></div>
        <pre id="icon-code" style="background:#1e1e1e;color:#d4d4d4;padding:12px;border-radius:8px;font-size:11px;max-height:200px;overflow:auto;white-space:pre-wrap;cursor:pointer" onclick="copyCode()"></pre>
        <button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="copyCode()">📋 Copy SVG</button>
      </div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

let currentIcon=null;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function filter(){
  const q=document.getElementById('search').value.toLowerCase();
  const size=document.getElementById('size').value;
  const color=document.getElementById('color').value;
  const filtered=icons.filter(i=>i.name.includes(q));
  document.getElementById('count').textContent=`${filtered.length} icons found`;
  document.getElementById('grid').innerHTML=filtered.map((icon,i)=>`
    <div class="icon-card" onclick="selectIcon(${icons.indexOf(icon)})">
      <svg width="${size}" height="${size}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="color:${color}">${icon.svg}</svg>
      <div class="name">${icon.name}</div>
    </div>
  `).join('');
}
function selectIcon(idx){
  currentIcon=icons[idx];
  const size=document.getElementById('size').value;
  const color=document.getElementById('color').value;
  const fullSvg=`<svg width="${size}" height="${size}" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${currentIcon.svg}</svg>`;
  document.getElementById('preview').innerHTML=fullSvg;
  document.getElementById('icon-name').textContent=currentIcon.name;
  document.getElementById('icon-code').textContent=fullSvg;
  document.getElementById('detail').style.display='block';
  document.getElementById('detail').scrollIntoView({behavior:'smooth'});
}
function copyCode(){if(!currentIcon)return;navigator.clipboard.writeText(document.getElementById('icon-code').textContent);toast('SVG copied!')}
function copyAllVisible(){toast('Use individual copy for best results');filter()}
filter();
</script>
