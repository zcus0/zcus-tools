<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Compressor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh}
.header{background:#16213e;padding:1rem 2rem;display:flex;align-items:center;gap:1rem;border-bottom:2px solid #FF6B00;position:sticky;top:0;z-index:100}
.header h1{font-size:1.5rem;font-weight:600}
.header a{color:#FF6B00;text-decoration:none;font-weight:500;margin-left:auto;padding:.5rem 1rem;border:1px solid #FF6B00;border-radius:6px;transition:all .2s}
.header a:hover{background:#FF6B00;color:#fff}
.header .icon{font-size:1.8rem}
.container{max-width:1000px;margin:0 auto;padding:1.5rem}
.drop-zone{border:2px dashed #444;border-radius:16px;padding:4rem 2rem;text-align:center;cursor:pointer;transition:all .3s;margin-bottom:1.5rem}
.drop-zone:hover,.drop-zone.dragover{border-color:#FF6B00;background:#FF6B0011}
.drop-zone .icon{font-size:4rem;margin-bottom:1rem;display:block}
.drop-zone p{color:#888;font-size:1rem;margin-bottom:.5rem}
.drop-zone .hint{font-size:.8rem;color:#555}
.drop-zone input{display:none}
.btn{background:#FF6B00;color:#fff;border:none;padding:.6rem 1.2rem;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;transition:all .2s;font-size:.9rem}
.btn:hover{background:#e55e00;transform:translateY(-1px)}
.btn-outline{background:transparent;border:1px solid #FF6B00;color:#FF6B00}
.btn-outline:hover{background:#FF6B00;color:#fff}
.btn-lg{padding:.75rem 2rem;font-size:1rem}
.controls{background:#16213e;border-radius:12px;padding:1.5rem;border:1px solid #333;margin-bottom:1.5rem}
.controls h3{margin-bottom:1rem;color:#fff;font-size:1rem}
.control-row{display:flex;gap:1.5rem;align-items:flex-end;flex-wrap:wrap}
.control-group{display:flex;flex-direction:column;gap:.35rem}
.control-group label{font-size:.8rem;color:#aaa;font-weight:500}
.control-group select{background:#1a1a2e;border:1px solid #333;color:#e0e0e0;padding:.5rem .75rem;border-radius:8px;font-family:'Inter',sans-serif}
.slider-container{display:flex;align-items:center;gap:1rem}
.slider-container input[type=range]{-webkit-appearance:none;width:300px;height:6px;border-radius:3px;background:#333;outline:none}
.slider-container input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#FF6B00;cursor:pointer}
.slider-value{background:#FF6B00;color:#fff;padding:.2rem .6rem;border-radius:6px;font-size:.85rem;font-weight:600;min-width:50px;text-align:center}
.compare{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem}
.compare-card{background:#16213e;border-radius:12px;padding:1.25rem;border:1px solid #333}
.compare-card h3{font-size:.95rem;margin-bottom:1rem;color:#aaa;text-transform:uppercase;letter-spacing:.05em}
.compare-card img{width:100%;max-height:300px;object-fit:contain;border-radius:8px;background:#0f0f23}
.file-info{display:flex;justify-content:space-between;margin-top:1rem;padding-top:.75rem;border-top:1px solid #333;font-size:.85rem}
.file-info .label{color:#888}
.file-info .value{color:#fff;font-weight:500}
.savings{background:#27ae6022;border:1px solid #27ae6044;color:#27ae60;padding:1rem;border-radius:10px;text-align:center;font-weight:600;font-size:1.1rem;margin-bottom:1.5rem;display:none}
.savings.show{display:block}
.empty{text-align:center;padding:3rem;color:#666}
.empty .icon{font-size:3rem;margin-bottom:1rem;display:block}
.actions-bar{display:flex;gap:.75rem;justify-content:center;margin-bottom:1.5rem}
.toast{position:fixed;bottom:2rem;right:2rem;background:#16213e;color:#fff;padding:1rem 1.5rem;border-radius:10px;border-left:4px solid #FF6B00;box-shadow:0 4px 20px rgba(0,0,0,0.4);z-index:300;transform:translateX(120%);transition:transform .3s ease;font-size:.9rem}
.toast.show{transform:translateX(0)}
.toast.error{border-left-color:#e74c3c}
.toast.success{border-left-color:#27ae60}
@media(max-width:768px){.compare{grid-template-columns:1fr}.slider-container input[type=range]{width:100%}.control-row{flex-direction:column}}
</style>
</head>
<body>
<header class="header">
<span class="icon">🖼️</span>
<h1>Image Compressor</h1>
<a href="../index.html">← Home</a>
</header>
<div class="container">
<div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
<span class="icon">📁</span>
<p>Drop an image here or click to browse</p>
<span class="hint">Supports JPEG, PNG, WebP</span>
<input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" onchange="handleFile(event)">
</div>
<div class="controls" id="controls" style="display:none">
<h3>Compression Settings</h3>
<div class="control-row">
<div class="control-group">
<label>Quality</label>
<div class="slider-container">
<input type="range" id="qualitySlider" min="0.1" max="1" step="0.05" value="0.7" oninput="updateQuality();compressImage()">
<span class="slider-value" id="qualityValue">70%</span>
</div>
</div>
<div class="control-group">
<label>Output Format</label>
<select id="outputFormat" onchange="compressImage()">
<option value="image/jpeg">JPEG</option>
<option value="image/png">PNG</option>
<option value="image/webp">WebP</option>
</select>
</div>
</div>
</div>
<div class="savings" id="savings"></div>
<div class="compare" id="compare" style="display:none">
<div class="compare-card">
<h3>Original</h3>
<img id="originalImg" alt="Original">
<div class="file-info">
<span class="label">File Size:</span>
<span class="value" id="originalSize">-</span>
</div>
<div class="file-info">
<span class="label">Dimensions:</span>
<span class="value" id="originalDims">-</span>
</div>
<div class="file-info">
<span class="label">Type:</span>
<span class="value" id="originalType">-</span>
</div>
</div>
<div class="compare-card">
<h3>Compressed</h3>
<img id="compressedImg" alt="Compressed">
<div class="file-info">
<span class="label">File Size:</span>
<span class="value" id="compressedSize">-</span>
</div>
<div class="file-info">
<span class="label">Dimensions:</span>
<span class="value" id="compressedDims">-</span>
</div>
<div class="file-info">
<span class="label">Type:</span>
<span class="value" id="compressedType">-</span>
</div>
</div>
</div>
<div class="actions-bar" id="actionsBar" style="display:none">
<button class="btn btn-lg" onclick="downloadCompressed()">📥 Download Compressed</button>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
let originalFile=null;
let compressedBlob=null;
let canvas=document.createElement('canvas');
let ctx=canvas.getContext('2d');

const dropZone=document.getElementById('dropZone');
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('dragover');});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('dragover');if(e.dataTransfer.files.length)handleFileObj(e.dataTransfer.files[0]);});

function handleFile(e){if(e.target.files.length)handleFileObj(e.target.files[0]);}
function handleFileObj(file){
  if(!file.type.match(/^image\/(jpeg|png|webp)$/)){showToast('Unsupported format','error');return;}
  originalFile=file;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      document.getElementById('originalImg').src=ev.target.result;
      document.getElementById('originalSize').textContent=formatSize(file.size);
      document.getElementById('originalDims').textContent=`${img.width} × ${img.height}`;
      document.getElementById('originalType').textContent=file.type;
      document.getElementById('controls').style.display='block';
      document.getElementById('compare').style.display='grid';
      document.getElementById('actionsBar').style.display='flex';
      compressImage();
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function updateQuality(){
  document.getElementById('qualityValue').textContent=Math.round(document.getElementById('qualitySlider').value*100)+'%';
}

function compressImage(){
  if(!originalFile)return;
  const img=new Image();
  img.onload=()=>{
    canvas.width=img.width;
    canvas.height=img.height;
    ctx.drawImage(img,0,0);
    const format=document.getElementById('outputFormat').value;
    const quality=parseFloat(document.getElementById('qualitySlider').value);
    canvas.toBlob(blob=>{
      compressedBlob=blob;
      document.getElementById('compressedSize').textContent=formatSize(blob.size);
      document.getElementById('compressedDims').textContent=`${img.width} × ${img.height}`;
      document.getElementById('compressedType').textContent=format;
      const url=URL.createObjectURL(blob);
      document.getElementById('compressedImg').src=url;
      const saved=originalFile.size-blob.size;
      const pct=Math.round((saved/originalFile.size)*100);
      const savingsEl=document.getElementById('savings');
      if(saved>0){
        savingsEl.textContent=`✅ Saved ${formatSize(saved)} (${pct}% smaller)`;
        savingsEl.style.background='#27ae6022';savingsEl.style.color='#27ae60';savingsEl.style.borderColor='#27ae6044';
      }else{
        savingsEl.textContent=`⚠️ Output is ${formatSize(Math.abs(saved))} larger (${Math.abs(pct)}% increase)`;
        savingsEl.style.background='#f39c1222';savingsEl.style.color='#f39c12';savingsEl.style.borderColor='#f39c1244';
      }
      savingsEl.classList.add('show');
    },format,quality);
  };
  img.src=URL.createObjectURL(originalFile);
}

function downloadCompressed(){
  if(!compressedBlob)return;
  const ext=document.getElementById('outputFormat').value.split('/')[1]==='jpeg'?'jpg':document.getElementById('outputFormat').value.split('/')[1];
  const a=document.createElement('a');
  a.href=URL.createObjectURL(compressedBlob);
  a.download=`compressed.${ext}`;
  a.click();
  showToast('Downloaded!','success');
}

function formatSize(b){
  if(b<1024)return b+' B';
  if(b<1048576)return (b/1024).toFixed(1)+' KB';
  return (b/1048576).toFixed(2)+' MB';
}

function showToast(msg,type='success'){
  const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
