<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>URL Encoder/Decoder</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f5f5;color:#333}
.header{background:#fff;padding:16px 24px;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.header a{color:#FF6B00;text-decoration:none;font-weight:600}
.header h1{font-size:20px;font-weight:700}
.header .icon{font-size:24px}
.container{max-width:800px;margin:24px auto;padding:0 16px}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card h2{font-size:16px;font-weight:600;margin-bottom:12px}
textarea{width:100%;height:80px;border:1px solid #e0e0e0;border-radius:8px;padding:12px;font-family:monospace;font-size:14px;resize:vertical}
textarea:focus{outline:2px solid #FF6B00;border-color:#FF6B00}
input[type=text]{width:100%;padding:10px 14px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px}
input[type=text]:focus{outline:2px solid #FF6B00}
.btn{background:#FF6B00;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-family:'Inter';font-weight:600;font-size:14px;cursor:pointer}
.btn:hover{opacity:.9}
.btn-secondary{background:#eee;color:#333}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.param-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.param-row input{flex:1}
.remove-btn{background:none;border:none;color:#e74c3c;cursor:pointer;font-size:18px}
.toast{position:fixed;bottom:24px;right:24px;background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:1000;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header"><a href="/">← Home</a><span class="icon">🔗</span><h1>URL Encoder / Decoder</h1></div>
<div class="container">
<div class="card">
<h2>Quick Encode / Decode</h2>
<textarea id="input" placeholder="Enter URL or text to encode/decode..."></textarea>
<div class="btn-row">
<button class="btn" onclick="encode()">Encode</button>
<button class="btn btn-secondary" onclick="decode()">Decode</button>
<button class="btn btn-secondary" onclick="copy(document.getElementById('input').value)">📋 Copy</button>
</div>
<textarea id="output" readonly placeholder="Result..." style="margin-top:8px"></textarea>
</div>
<div class="card">
<h2>Query String Builder</h2>
<div id="params"></div>
<div class="btn-row">
<button class="btn btn-sm btn-secondary" onclick="addParam()">+ Add Parameter</button>
</div>
<div style="margin-top:12px">
<label style="font-size:13px;font-weight:600">Generated URL:</label>
<textarea id="builtUrl" readonly style="margin-top:4px;height:60px" placeholder="Add parameters above..."></textarea>
<div class="btn-row">
<button class="btn btn-secondary" onclick="copy(document.getElementById('builtUrl').value)">📋 Copy URL</button>
</div>
</div>
</div>
</div>
<div id="toast" class="toast"></div>
<script>
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function encode(){document.getElementById('output').value=encodeURIComponent(document.getElementById('input').value);toast('Encoded!')}
function decode(){try{document.getElementById('output').value=decodeURIComponent(document.getElementById('input').value);toast('Decoded!')}catch(e){toast('Invalid encoding')}}
let paramCount=0;
function addParam(){
const id=paramCount++;
const row=document.createElement('div');row.className='param-row';row.id='p'+id;
row.innerHTML=`<input type="text" placeholder="Key" oninput="buildUrl()" value="" data-param="key">
<input type="text" placeholder="Value" oninput="buildUrl()" value="" data-param="val">
<button class="remove-btn" onclick="this.parentElement.remove();buildUrl()">✕</button>`;
document.getElementById('params').appendChild(row);
buildUrl();
}
function buildUrl(){
const rows=document.querySelectorAll('.param-row');
const parts=[];rows.forEach(r=>{
const k=r.querySelector('[data-param=key]').value;
const v=r.querySelector('[data-param=val]').value;
if(k)parts.push(encodeURIComponent(k)+'='+encodeURIComponent(v));
});
document.getElementById('builtUrl').value=parts.length?'?'+parts.join('&'):'';
}
function copy(v){navigator.clipboard.writeText(v).then(()=>toast('Copied!'))}
addParam();
</script>
</body>
</html>
