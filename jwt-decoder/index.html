<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>JWT Decoder</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}:root{--accent:#FF6B00;--bg:#f8f9fc;--card:#fff;--text:#1a1a2e;--text2:#6b7280;--border:#e5e7eb;--radius:12px}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}.app{max-width:900px;margin:0 auto;padding:20px}
.header{display:flex;align-items:center;gap:12px;padding:16px 0;border-bottom:2px solid var(--accent);margin-bottom:24px}
.header h1{font-size:1.5rem;font-weight:700}.header a{color:var(--accent);text-decoration:none;font-size:0.85rem;margin-left:auto}
.btn{background:var(--accent);color:#fff;border:none;padding:10px 20px;border-radius:var(--radius);font-weight:600;cursor:pointer;font-size:0.9rem}.btn:hover{opacity:.9}.btn-sm{padding:6px 14px;font-size:0.8rem}.btn-outline{background:transparent;color:var(--accent);border:2px solid var(--accent)}
.card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);border:1px solid var(--border)}
textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:0.85rem;background:var(--card);color:var(--text);resize:vertical;outline:none;min-height:80px}
textarea:focus{border-color:var(--accent)}
pre{background:#1e1e2e;color:#a6e3a1;padding:16px;border-radius:8px;overflow-x:auto;font-size:0.82rem;line-height:1.6;font-family:'JetBrains Mono',monospace;max-height:400px;overflow-y:auto}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:12px 24px;border-radius:var(--radius);font-size:0.85rem;z-index:9999}
.info{background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:12px;font-size:0.85rem;color:#9a3412;margin-bottom:16px}
footer{text-align:center;padding:24px;color:var(--text2);font-size:0.75rem}
</style></head><body>
<div class="app">
  <div class="header"><span style="font-size:1.8rem">🔑</span><h1>JWT Decoder</h1><a href="/">← Home</a></div>
  <div class="info">💡 Paste a JWT token to decode header, payload & signature.</div>
  <div class="card">
    <textarea id="jwt" placeholder="Paste JWT token here..." oninput="decode()"></textarea>
    <div style="margin-top:8px"><button class="btn btn-sm btn-outline" onclick="loadSample()">Load Sample</button></div>
  </div>
  <div class="card"><div style="font-weight:600;margin-bottom:8px">📋 Header</div><pre id="header">-</pre></div>
  <div class="card"><div style="font-weight:600;margin-bottom:8px">📦 Payload</div><pre id="payload">-</pre></div>
  <div class="card"><div style="font-weight:600;margin-bottom:8px">🔏 Signature</div><pre id="signature">-</pre></div>
  <div class="card"><div style="font-weight:600;margin-bottom:8px">⏰ Expiration</div><div id="expiry" style="font-size:0.9rem"></div></div>
</div><footer>ZCUS Tools — JWT Decoder</footer>
<script>
function toast(m){var t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove()},2500)}
function decode(){
  var token=document.getElementById('jwt').value.trim();
  if(!token){document.getElementById('header').textContent='-';document.getElementById('payload').textContent='-';document.getElementById('signature').textContent='-';document.getElementById('expiry').textContent='';return}
  var parts=token.split('.');
  if(parts.length<2){document.getElementById('header').textContent='Invalid JWT';return}
  try{
    var header=JSON.parse(atob(parts[0].replace(/-/g,'+').replace(/_/g,'/')));
    var payload=JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));
    document.getElementById('header').textContent=JSON.stringify(header,null,2);
    document.getElementById('payload').textContent=JSON.stringify(payload,null,2);
    document.getElementById('signature').textContent=parts[2]||'(none)';
    if(payload.exp){
      var exp=new Date(payload.exp*1000);var now=new Date();var diff=exp-now;
      var status=diff>0?'✅ Valid (expires in '+fmtDur(diff)+')':'❌ Expired ('+fmtDur(-diff)+' ago)';
      var color=diff>0?'#166534':'#991b1b';
      document.getElementById('expiry').innerHTML='<div style="color:'+color+';font-weight:600;font-size:1.1rem">'+status+'</div><div style="font-size:0.85rem;color:var(--text2);margin-top:4px">Expires: '+exp.toLocaleString('id')+'</div>';
    }else{
      document.getElementById('expiry').innerHTML='<div style="color:var(--text2)">No exp claim</div>';
    }
  }catch(e){document.getElementById('header').textContent='Error: '+e.message}
}
function fmtDur(ms){var s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60),d=Math.floor(h/24);if(d>0)return d+'d '+h%24+'h';if(h>0)return h+'h '+m%60+'m';return m+'m '+s%60+'s'}
function loadSample(){
  var h=btoa(JSON.stringify({alg:'HS256',typ:'JWT'}));
  var p=btoa(JSON.stringify({sub:'1234567890',name:'Tuan ZCUS',iat:Math.floor(Date.now()/1000),exp:Math.floor(Date.now()/1000)+86400}));
  document.getElementById('jwt').value=h+'.'+p+'.sample_signature';
  decode();
}
</script></body></html>
