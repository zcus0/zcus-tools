<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Cost Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f5f5;color:#333;min-height:100vh}
.header{background:#fff;border-bottom:1px solid #e0e0e0;padding:16px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.header a{color:#FF6B00;text-decoration:none;font-weight:500;font-size:14px}
.header .icon{font-size:24px}
.header h1{font-size:18px;font-weight:600;flex:1}
.container{max-width:1000px;margin:0 auto;padding:24px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:24px;margin-bottom:20px}
.card h2{font-size:16px;font-weight:600;margin-bottom:16px}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;transition:all .2s}
.btn-primary{background:#FF6B00;color:#fff}.btn-primary:hover{background:#e55a00}
.btn-outline{background:transparent;border:1px solid #ddd;color:#555}.btn-outline:hover{border-color:#FF6B00;color:#FF6B00}
.btn-sm{padding:5px 10px;font-size:12px}
input[type=text],input[type=number],select{font-family:'Inter',sans-serif;font-size:14px;padding:10px 12px;border:1px solid #ddd;border-radius:8px;width:100%;outline:none;transition:border .2s}
input:focus,select:focus{border-color:#FF6B00}
label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#555}
.row{display:flex;gap:16px;flex-wrap:wrap}
.row>*{flex:1;min-width:200px}
.toast{position:fixed;bottom:24px;right:24px;background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.result-box{text-align:center;padding:32px;background:linear-gradient(135deg,#FF6B00,#ff8533);border-radius:12px;color:#fff;margin-top:16px}
.result-box .cost{font-size:48px;font-weight:700}
.result-box .label{font-size:14px;opacity:.9}
.compare-table{width:100%;border-collapse:collapse;margin-top:16px}
.compare-table th,.compare-table td{padding:10px 12px;text-align:left;border-bottom:1px solid #eee;font-size:13px}
.compare-table th{font-weight:600;color:#555;font-size:12px;text-transform:uppercase}
.compare-table tr:hover{background:#f9f9f9}
.compare-table .highlight{color:#FF6B00;font-weight:700}
.chip{display:inline-block;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;margin:2px}
.chip-green{background:#e6f9e6;color:#2d7a2d}
.chip-yellow{background:#fff5e6;color:#cc7700}
.chip-red{background:#ffe6e6;color:#cc0000}
</style>
</head>
<body>
<div class="header">
  <a href="/">← Home</a>
  <span class="icon">🧮</span>
  <h1>AI Cost Calculator</h1>
</div>
<div class="container">
  <div class="card">
    <h2>Calculate Cost</h2>
    <div class="row">
      <div><label>Model</label>
        <select id="model" onchange="updatePricing()">
          <option value="gpt-4o">GPT-4o ($2.50 / $10 per 1M)</option>
          <option value="gpt-4o-mini">GPT-4o Mini ($0.15 / $0.60 per 1M)</option>
          <option value="gpt-4-turbo">GPT-4 Turbo ($10 / $30 per 1M)</option>
          <option value="gpt-4">GPT-4 ($30 / $60 per 1M)</option>
          <option value="gpt-3.5-turbo">GPT-3.5 Turbo ($0.50 / $1.50 per 1M)</option>
          <option value="claude-3.5-sonnet">Claude 3.5 Sonnet ($3 / $15 per 1M)</option>
          <option value="claude-3-opus">Claude 3 Opus ($15 / $75 per 1M)</option>
          <option value="claude-3-haiku">Claude 3 Haiku ($0.25 / $1.25 per 1M)</option>
          <option value="gemini-pro">Gemini 1.5 Pro ($1.25 / $5 per 1M)</option>
          <option value="gemini-flash">Gemini 1.5 Flash ($0.075 / $0.30 per 1M)</option>
          <option value="llama3-70b">Llama 3 70B ($0.90 / $0.90 per 1M)</option>
          <option value="mistral-large">Mistral Large ($3 / $9 per 1M)</option>
          <option value="custom">Custom Pricing</option>
        </select>
      </div>
    </div>
    <div id="custom-pricing" style="display:none;margin-top:12px">
      <div class="row">
        <div><label>Input Price ($ per 1M tokens)</label><input type="number" id="custom-input-price" step="0.001" value="1.00"></div>
        <div><label>Output Price ($ per 1M tokens)</label><input type="number" id="custom-output-price" step="0.001" value="2.00"></div>
      </div>
    </div>
    <div class="row" style="margin-top:16px">
      <div><label>Input Tokens</label><input type="number" id="input-tokens" value="1000" min="0" oninput="calc()"></div>
      <div><label>Output Tokens</label><input type="number" id="output-tokens" value="500" min="0" oninput="calc()"></div>
      <div><label>Requests</label><input type="number" id="requests" value="1" min="1" oninput="calc()"></div>
    </div>
    <div class="result-box">
      <div class="label">Estimated Cost</div>
      <div class="cost" id="cost">$0.00</div>
      <div style="margin-top:8px;font-size:13px" id="cost-breakdown"></div>
    </div>
  </div>
  <div class="card">
    <h2>Compare All Models</h2>
    <p style="font-size:13px;color:#888;margin-bottom:12px">Cost comparison for current token counts across all models</p>
    <div style="overflow-x:auto">
      <table class="compare-table" id="compare-table"></table>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const models=[
  {id:'gpt-4o',name:'GPT-4o',provider:'OpenAI',input:2.50,output:10.00},
  {id:'gpt-4o-mini',name:'GPT-4o Mini',provider:'OpenAI',input:0.15,output:0.60},
  {id:'gpt-4-turbo',name:'GPT-4 Turbo',provider:'OpenAI',input:10.00,output:30.00},
  {id:'gpt-4',name:'GPT-4',provider:'OpenAI',input:30.00,output:60.00},
  {id:'gpt-3.5-turbo',name:'GPT-3.5 Turbo',provider:'OpenAI',input:0.50,output:1.50},
  {id:'claude-3.5-sonnet',name:'Claude 3.5 Sonnet',provider:'Anthropic',input:3.00,output:15.00},
  {id:'claude-3-opus',name:'Claude 3 Opus',provider:'Anthropic',input:15.00,output:75.00},
  {id:'claude-3-haiku',name:'Claude 3 Haiku',provider:'Anthropic',input:0.25,output:1.25},
  {id:'gemini-pro',name:'Gemini 1.5 Pro',provider:'Google',input:1.25,output:5.00},
  {id:'gemini-flash',name:'Gemini 1.5 Flash',provider:'Google',input:0.075,output:0.30},
  {id:'llama3-70b',name:'Llama 3 70B',provider:'Groq',input:0.90,output:0.90},
  {id:'mistral-large',name:'Mistral Large',provider:'Mistral',input:3.00,output:9.00}
];
function updatePricing(){
  document.getElementById('custom-pricing').style.display=document.getElementById('model').value==='custom'?'block':'none';
  calc();
}
function getModel(){
  const sel=document.getElementById('model').value;
  if(sel==='custom')return{name:'Custom',input:parseFloat(document.getElementById('custom-input-price').value)||0,output:parseFloat(document.getElementById('custom-output-price').value)||0};
  return models.find(m=>m.id===sel)||{input:0,output:0};
}
function calcCost(m,input,output){return((input*m.input/1e6)+(output*m.output/1e6));}
function calc(){
  const m=getModel();
  const input=parseInt(document.getElementById('input-tokens').value)||0;
  const output=parseInt(document.getElementById('output-tokens').value)||0;
  const requests=parseInt(document.getElementById('requests').value)||1;
  const cost=calcCost(m,input,output)*requests;
  document.getElementById('cost').textContent='$'+cost.toFixed(4);
  const inputCost=(input*m.input/1e6*requests).toFixed(4);
  const outputCost=(output*m.output/1e6*requests).toFixed(4);
  document.getElementById('cost-breakdown').textContent=`Input: $${inputCost} | Output: $${outputCost}`;
  renderCompare(input,output,requests);
}
function renderCompare(input,output,requests){
  const all=models.map(m=>({...m,total:calcCost(m,input,output)*requests})).sort((a,b)=>a.total-b.total);
  const min=all[0].total;
  let html='<tr><th>Model</th><th>Provider</th><th>Input $/1M</th><th>Output $/1M</th><th>Total Cost</th><th></th></tr>';
  all.forEach(m=>{
    const badge=m.total===min?'<span class="chip chip-green">Cheapest</span>':m.total<min*3?'<span class="chip chip-yellow">Mid</span>':'<span class="chip chip-red">Expensive</span>';
    html+=`<tr><td>${m.name}</td><td>${m.provider}</td><td>$${m.input}</td><td>$${m.output}</td><td class="highlight">$${m.total.toFixed(4)}</td><td>${badge}</td></tr>`;
  });
  document.getElementById('compare-table').innerHTML=html;
}
calc();
</script>
</body>
</html>
