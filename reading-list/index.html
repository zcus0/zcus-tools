<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading List</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;padding:16px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.header a{color:#FF6B00;text-decoration:none;font-size:14px}
.header h1{font-size:20px;font-weight:700}
.header span{font-size:24px}
.container{max-width:700px;margin:0 auto}
.card{background:#16213e;border-radius:12px;padding:24px;border:1px solid #233554;margin-bottom:16px}
label{display:block;color:#888;font-size:12px;margin-bottom:4px}
input,select{width:100%;padding:10px;background:#0f0f23;border:1px solid #233554;border-radius:8px;color:#fff;font-family:'Inter',sans-serif;font-size:14px;margin-bottom:10px}
input:focus,select:focus{outline:none;border-color:#FF6B00}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{padding:10px 20px;background:#FF6B00;border:none;color:#fff;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.btn:hover{background:#e65c00}
.btn-sm{padding:4px 10px;font-size:12px}
.btn-secondary{background:#233554}
.filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{padding:6px 12px;background:#233554;border:none;color:#888;border-radius:6px;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif}
.filter-btn.active{background:#FF6B00;color:#fff}
.book-card{background:#0f0f23;border-radius:8px;padding:16px;margin-bottom:8px;border:1px solid #233554;display:flex;gap:12px;align-items:start}
.book-info{flex:1}
.book-title{font-weight:600;font-size:15px}
.book-author{font-size:13px;color:#888}
.book-url{font-size:12px;color:#FF6B00;text-decoration:none}
.book-url:hover{text-decoration:underline}
.status-badge{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600}
.status-to-read{background:#233554;color:#888}
.status-reading{background:#0e4429;color:#39d353}
.status-done{background:#1a1a3e;color:#6c5ce7}
.stars{color:#f1c40f;font-size:14px;cursor:pointer}
.toast{position:fixed;bottom:20px;right:20px;background:#FF6B00;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header"><a href="/">← Home</a><span>📚</span><h1>Reading List</h1></div>
<div class="container">
<div class="card">
<label>Title</label><input type="text" id="rTitle" placeholder="Book/article title...">
<div class="form-grid">
<div><label>Author</label><input type="text" id="rAuthor" placeholder="Author"></div>
<div><label>URL (optional)</label><input type="url" id="rUrl" placeholder="https://..."></div>
</div>
<label>Status</label>
<select id="rStatus"><option value="to-read">To Read</option><option value="reading">Reading</option><option value="done">Done</option></select>
<label>Rating</label>
<div class="stars" id="starInput" style="margin-bottom:10px">★★★★★</div>
<button class="btn" onclick="addBook()">Add to List</button>
</div>
<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
<h3 style="font-size:14px;color:#888">My Reading List</h3>
<button class="btn btn-sm btn-secondary" onclick="exportList()">Export</button>
</div>
<div class="filters">
<button class="filter-btn active" onclick="filterBy('all',this)">All</button>
<button class="filter-btn" onclick="filterBy('to-read',this)">To Read</button>
<button class="filter-btn" onclick="filterBy('reading',this)">Reading</button>
<button class="filter-btn" onclick="filterBy('done',this)">Done</button>
</div>
<div id="bookList"></div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
let books=JSON.parse(localStorage.getItem('reading_list')||'[]');
let currentFilter='all',selectedRating=3;
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function save(){localStorage.setItem('reading_list',JSON.stringify(books))}
function setRating(r){selectedRating=r;updateStars()}
function updateStars(){document.getElementById('starInput').textContent='★'.repeat(selectedRating)+'☆'.repeat(5-selectedRating)}
function addBook(){
const title=document.getElementById('rTitle').value.trim(),author=document.getElementById('rAuthor').value.trim(),url=document.getElementById('rUrl').value.trim(),status=document.getElementById('rStatus').value;
if(!title){toast('Enter a title');return}
books.push({id:Date.now(),title,author,url,status,rating:selectedRating});
document.getElementById('rTitle').value='';document.getElementById('rAuthor').value='';document.getElementById('rUrl').value='';
save();render();toast('Added!')}
function removeBook(id){books=books.filter(b=>b.id!==id);save();render()}
function setRatingFor(id,r){const b=books.find(x=>x.id===id);if(b){b.rating=r;save();render()}}
function cycleStatus(id){const b=books.find(x=>x.id===id);if(!b)return;const order=['to-read','reading','done'];b.status=order[(order.indexOf(b.status)+1)%3];save();render()}
function filterBy(f,el){currentFilter=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');render()}
function render(){
const filtered=currentFilter==='all'?books:books.filter(b=>b.status===currentFilter);
document.getElementById('bookList').innerHTML=filtered.length?filtered.map(b=>`<div class="book-card"><div class="book-info"><div class="book-title">${b.title}</div>${b.author?`<div class="book-author">${b.author}</div>`:''}${b.url?`<a class="book-url" href="${b.url}" target="_blank">${b.url.slice(0,40)}...</a>`:''}
<div style="margin-top:6px;display:flex;gap:8px;align-items:center"><span class="status-badge status-${b.status}" onclick="cycleStatus(${b.id})" style="cursor:pointer">${b.status}</span><span class="stars">${'★'.repeat(b.rating)+'☆'.repeat(5-b.rating)}</span></div></div><button class="btn btn-sm btn-secondary" onclick="removeBook(${b.id})">✕</button></div>`).join(''):'<div style="text-align:center;color:#555;padding:20px">No items</div>'}
function exportList(){
const csv='Title,Author,URL,Status,Rating\n'+books.map(b=>`"${b.title}","${b.author}","${b.url}","${b.status}",${b.rating}`).join('\n');
const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='reading-list.csv';a.click();toast('Exported!')}
document.getElementById('starInput').addEventListener('click',e=>{if(e.target.textContent==='★')return});
for(let i=1;i<=5;i++){document.getElementById('starInput').children[i-1].onclick=()=>setRating(i)}
updateStars();render();
</script>
</body>
</html>
