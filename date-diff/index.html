<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Date Difference Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;padding:16px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.header a{color:#FF6B00;text-decoration:none;font-size:14px}
.header h1{font-size:20px;font-weight:700}
.header span{font-size:24px}
.container{max-width:600px;margin:0 auto}
.card{background:#16213e;border-radius:12px;padding:24px;border:1px solid #233554;margin-bottom:16px}
label{display:block;color:#888;font-size:13px;margin-bottom:6px}
input[type=date],input[type=number],select{width:100%;padding:12px;background:#0f0f23;border:1px solid #233554;border-radius:8px;color:#fff;font-size:16px;font-family:'Inter',sans-serif;margin-bottom:12px}
input:focus,select:focus{outline:none;border-color:#FF6B00}
.btn{padding:12px 24px;background:#FF6B00;border:none;color:#fff;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;margin-top:8px}
.btn:hover{background:#e65c00}
.btn-sm{padding:8px 16px;font-size:13px}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{padding:8px 16px;background:#233554;border:none;color:#888;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px}
.tab.active{background:#FF6B00;color:#fff}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.result-item{background:#0f0f23;padding:12px;border-radius:8px;text-align:center}
.result-item .val{font-size:24px;font-weight:700;color:#FF6B00}
.result-item .lbl{font-size:11px;color:#888;margin-top:4px}
.toast{position:fixed;bottom:20px;right:20px;background:#FF6B00;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header"><a href="/">← Home</a><span>📅</span><h1>Date Difference Calculator</h1></div>
<div class="container">
<div class="tabs">
<button class="tab active" onclick="showTab('diff',this)">Difference</button>
<button class="tab" onclick="showTab('biz',this)">Business Days</button>
<button class="tab" onclick="showTab('add',this)">Add/Subtract</button>
</div>
<div class="card" id="tabDiff">
<label>From Date</label><input type="date" id="date1" onchange="calcDiff()">
<label>To Date</label><input type="date" id="date2" onchange="calcDiff()">
<button class="btn" onclick="calcDiff()">Calculate</button>
<div id="diffResults" style="margin-top:16px"></div>
</div>
<div class="card" id="tabBiz" style="display:none">
<label>Start Date</label><input type="date" id="bizStart">
<label>End Date</label><input type="date" id="bizEnd">
<button class="btn" onclick="calcBiz()">Calculate Business Days</button>
<div id="bizResult" style="margin-top:16px;font-size:18px;text-align:center;padding:10px"></div>
</div>
<div class="card" id="tabAdd" style="display:none">
<label>Start Date</label><input type="date" id="addDate">
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
<div><label>Years</label><input type="number" id="addY" value="0"></div>
<div><label>Months</label><input type="number" id="addM" value="0"></div>
<div><label>Days</label><input type="number" id="addD" value="0"></div>
</div>
<button class="btn" onclick="calcAdd()">Add</button>
<button class="btn btn-sm" style="background:#233554;margin-left:8px" onclick="calcSub()">Subtract</button>
<div id="addResult" style="margin-top:16px;font-size:18px;text-align:center;padding:10px"></div>
</div>
</div>
<div class="toast" id="toast"></div>
<script>
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function showTab(name,el){document.querySelectorAll('.card').forEach(c=>c.style.display='none');document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
document.getElementById({diff:'tabDiff',biz:'tabBiz',add:'tabAdd'}[name]).style.display='block'}
function calcDiff(){
const d1=new Date(document.getElementById('date1').value),d2=new Date(document.getElementById('date2').value);
if(isNaN(d1)||isNaN(d2)){toast('Select both dates');return}
const diff=Math.abs(d2-d1);
const days=Math.floor(diff/(1000*60*60*24));
const weeks=Math.floor(days/7);
const months=Math.floor(days/30.44);
const years=Math.floor(days/365.25);
const hours=Math.floor(diff/(1000*60*60));
const minutes=Math.floor(diff/(1000*60));
const seconds=Math.floor(diff/1000);
document.getElementById('diffResults').innerHTML=`<div class="result-grid">
<div class="result-item"><div class="val">${years}</div><div class="lbl">Years</div></div>
<div class="result-item"><div class="val">${months}</div><div class="lbl">Months</div></div>
<div class="result-item"><div class="val">${weeks}</div><div class="lbl">Weeks</div></div>
<div class="result-item"><div class="val">${days}</div><div class="lbl">Days</div></div>
<div class="result-item"><div class="val">${hours.toLocaleString()}</div><div class="lbl">Hours</div></div>
<div class="result-item"><div class="val">${minutes.toLocaleString()}</div><div class="lbl">Minutes</div></div>
<div class="result-item"><div class="val">${seconds.toLocaleString()}</div><div class="lbl">Seconds</div></div>
</div>`;
}
function calcBiz(){
const s=new Date(document.getElementById('bizStart').value),e=new Date(document.getElementById('bizEnd').value);
if(isNaN(s)||isNaN(e)){toast('Select dates');return}
let count=0,cur=new Date(Math.min(s,e)),end=new Date(Math.max(s,e));
while(cur<=end){if(cur.getDay()%6!==0)count++;cur.setDate(cur.getDate()+1)}
document.getElementById('bizResult').innerHTML=`Business Days: <strong style="color:#FF6B00">${count}</strong>`;
}
function calcAdd(){
const d=new Date(document.getElementById('addDate').value);
if(isNaN(d)){toast('Select date');return}
const y=parseInt(document.getElementById('addY').value)||0,m=parseInt(document.getElementById('addM').value)||0,dy=parseInt(document.getElementById('addD').value)||0;
const r=new Date(d);r.setFullYear(r.getFullYear()+y);r.setMonth(r.getMonth()+m);r.setDate(r.getDate()+dy);
document.getElementById('addResult').innerHTML=`Result: <strong style="color:#FF6B00">${r.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</strong>`;
}
function calcSub(){
const d=new Date(document.getElementById('addDate').value);
if(isNaN(d)){toast('Select date');return}
const y=parseInt(document.getElementById('addY').value)||0,m=parseInt(document.getElementById('addM').value)||0,dy=parseInt(document.getElementById('addD').value)||0;
const r=new Date(d);r.setFullYear(r.getFullYear()-y);r.setMonth(r.getMonth()-m);r.setDate(r.getDate()-dy);
document.getElementById('addResult').innerHTML=`Result: <strong style="color:#FF6B00">${r.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</strong>`;
}
document.getElementById('date1').value=new Date(Date.now()-86400000*30).toISOString().split('T')[0];
document.getElementById('date2').value=new Date().toISOString().split('T')[0];
calcDiff();
</script>
</body>
</html>
