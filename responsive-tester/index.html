<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Responsive Tester</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f5f5;min-height:100vh}
.header{background:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #FF6B00;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.header h1{font-size:1.3rem;color:#333;display:flex;align-items:center;gap:8px}
.header a{color:#FF6B00;text-decoration:none;font-weight:600;font-size:.9rem}
.container{max-width:1100px;margin:24px auto;padding:0 16px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.08);padding:24px;margin-bottom:20px}
.card h2{font-size:1.1rem;color:#333;margin-bottom:12px}
.url-row{display:flex;gap:10px}
.url-row input{flex:1;border:2px solid #ddd;border-radius:8px;padding:10px 14px;font-family:inherit;font-size:.95rem}
.url-row input:focus{outline:none;border-color:#FF6B00}
.btn{background:#FF6B00;color:#fff;border:none;border-radius:8px;padding:10px 20px;cursor:pointer;font-family:inherit;font-weight:600;font-size:.9rem;transition:.2s}
.btn:hover{background:#e55d00}
.presets{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.preset{border:2px solid #ddd;border-radius:8px;padding:6px 14px;background:#fff;cursor:pointer;font-family:inherit;font-size:.8rem;transition:.2s}
.preset:hover,.preset.active{border-color:#FF6B00;background:#fff5ed;color:#FF6B00;font-weight:600}
.frame-wrap{display:flex;justify-content:center;overflow:auto;padding:16px 0;min-height:300px;background:#e0e0e0;border-radius:8px}
.frame-wrap iframe{border:none;border-radius:4px;background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.15);transition:width .4s,height .4s}
.size-label{text-align:center;margin-top:8px;font-size:.85rem;color:#888;font-weight:600}
.toast{position:fixed;bottom:24px;right:24px;background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:.9rem;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header">
  <h1>📱 Responsive Tester</h1>
  <a href="/">← Home</a>
</div>
<div class="container">
  <div class="card">
    <h2>Enter URL</h2>
    <div class="url-row">
      <input type="text" id="urlInput" placeholder="https://example.com" value="https://example.com">
      <button class="btn" onclick="loadUrl()">Load</button>
    </div>
    <div class="presets" id="presets"></div>
  </div>
  <div class="card">
    <div class="frame-wrap">
      <iframe id="frame" src="https://example.com"></iframe>
    </div>
    <div class="size-label" id="sizeLabel">1024 × 768</div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
const devices=[
  {name:'📱 iPhone SE',w:375,h:667},
  {name:'📱 iPhone 14',w:390,h:844},
  {name:'📱 Galaxy S21',w:360,h:800},
  {name:'📱 Pixel 7',w:412,h:915},
  {name:'💻 Laptop',w:1366,h:768},
  {name:'🖥️ Desktop',w:1920,h:1080},
  {name:'📱 iPad',w:768,h:1024},
  {name:'📱 iPad Pro',w:1024,h:1366},
  {name:'📺 4K',w:3840,h:2160}
];
const frame=document.getElementById('frame');
const presetsDiv=document.getElementById('presets');
let activeIdx=0;

devices.forEach((d,i)=>{
  const btn=document.createElement('button');
  btn.className='preset'+(i===0?' active':'');
  btn.textContent=d.name+' ('+d.w+'x'+d.h+')';
  btn.onclick=()=>setDevice(i);
  presetsDiv.appendChild(btn);
});

function setDevice(i){
  activeIdx=i;
  document.querySelectorAll('.preset').forEach((b,j)=>b.classList.toggle('active',j===i));
  frame.style.width=devices[i].w+'px';frame.style.height=devices[i].h+'px';
  document.getElementById('sizeLabel').textContent=devices[i].w+' × '+devices[i].h;
}

function loadUrl(){
  const url=document.getElementById('urlInput').value.trim();
  if(!url){toast('Enter a URL');return}
  frame.src=url.startsWith('http')?url:'https://'+url;toast('Loading...');
}

document.getElementById('urlInput').addEventListener('keydown',e=>{if(e.key==='Enter')loadUrl()});
setDevice(0);
</script>
</body></html>
