<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Placeholder Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f5f5;color:#333;min-height:100vh}
.header{background:#fff;border-bottom:1px solid #e0e0e0;padding:16px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.header a{color:#FF6B00;text-decoration:none;font-weight:500;font-size:14px}
.header .icon{font-size:24px}
.header h1{font-size:18px;font-weight:600;flex:1}
.container{max-width:900px;margin:0 auto;padding:24px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:24px;margin-bottom:20px}
.card h2{font-size:16px;font-weight:600;margin-bottom:16px}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;transition:all .2s}
.btn-primary{background:#FF6B00;color:#fff}.btn-primary:hover{background:#e55a00}
.btn-outline{background:transparent;border:1px solid #ddd;color:#555}.btn-outline:hover{border-color:#FF6B00;color:#FF6B00}
.btn-sm{padding:5px 10px;font-size:12px}
input[type=text],input[type=number],input[type=color],select{font-family:'Inter',sans-serif;font-size:14px;padding:10px 12px;border:1px solid #ddd;border-radius:8px;outline:none;width:100%}
input:focus,select:focus{border-color:#FF6B00}
input[type=color]{width:50px;height:44px;padding:4px;cursor:pointer}
label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#555}
.toast{position:fixed;bottom:24px;right:24px;background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.row{display:flex;gap:16px;flex-wrap:wrap}
.row>*{flex:1;min-width:150px}
.preview-wrap{display:flex;justify-content:center;padding:20px;background:repeating-conic-gradient(#e0e0e0 0% 25%, #fff 0% 50%) 50%/20px 20px;border-radius:12px;margin-bottom:16px;overflow:auto}
.preview-wrap canvas{border:1px solid #ddd;border-radius:4px;max-width:100%;height:auto}
.presets{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.preset{padding:6px 12px;border:1px solid #eee;border-radius:6px;background:#f9f9f9;cursor:pointer;font-size:12px;font-weight:500;transition:all .2s}
.preset:hover{border-color:#FF6B00;background:#fff5f0}
</style>
</head>
<body>
<div class="header">
  <a href="/">← Home</a>
  <span class="icon">🖼️</span>
  <h1>Image Placeholder Generator</h1>
</div>
<div class="container">
  <div class="card">
    <h2>Preview</h2>
    <div class="preview-wrap"><canvas id="canvas" width="600" height="400"></canvas></div>
  </div>
  <div class="card">
    <h2>Settings</h2>
    <div class="row">
      <div><label>Width (px)</label><input type="number" id="width" value="600" min="10" max="4000" oninput="update()"></div>
      <div><label>Height (px)</label><input type="number" id="height" value="400" min="10" max="4000" oninput="update()"></div>
      <div><label>Background</label><div style="display:flex;gap:8px"><input type="color" id="bg" value="#e0e0e0" oninput="update()"><input type="text" id="bg-text" value="#e0e0e0" onchange="document.getElementById('bg').value=this.value;update()" style="width:100px"></div></div>
      <div><label>Text Color</label><div style="display:flex;gap:8px"><input type="color" id="fg" value="#999999" oninput="update()"><input type="text" id="fg-text" value="#999999" onchange="document.getElementById('fg').value=this.value;update()" style="width:100px"></div></div>
    </div>
    <div class="row" style="margin-top:12px">
      <div><label>Text</label><input type="text" id="text" value="" placeholder="600 × 400" oninput="update()"></div>
      <div><label>Font Size</label><input type="number" id="fontSize" value="24" min="8" max="200" oninput="update()"></div>
      <div><label>Format</label>
        <select id="format" onchange="update()"><option value="png">PNG</option><option value="jpeg">JPEG</option><option value="webp">WebP</option></select>
      </div>
    </div>
    <div class="presets" style="margin-top:12px">
      <span style="font-size:12px;color:#999;line-height:30px">Quick sizes:</span>
      <button class="preset" onclick="setSize(1920,1080)">1920×1080</button>
      <button class="preset" onclick="setSize(1280,720)">1280×720</button>
      <button class="preset" onclick="setSize(800,600)">800×600</button>
      <button class="preset" onclick="setSize(600,400)">600×400</button>
      <button class="preset" onclick="setSize(400,400)">400×400</button>
      <button class="preset" onclick="setSize(300,250)">300×250</button>
      <button class="preset" onclick="setSize(728,90)">728×90</button>
    </div>
    <div style="margin-top:16px;display:flex;gap:8px">
      <button class="btn btn-primary" onclick="download()">💾 Download</button>
      <button class="btn btn-outline" onclick="copyDataURL()">📋 Copy Data URL</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function update(){
  const w=+document.getElementById('width').value;const h=+document.getElementById('height').value;
  const bg=document.getElementById('bg').value;const fg=document.getElementById('fg').value;
  const text=document.getElementById('text').value||`${w} × ${h}`;
  const fontSize=+document.getElementById('fontSize').value;
  document.getElementById('bg-text').value=bg;document.getElementById('fg-text').value=fg;
  const canvas=document.getElementById('canvas');canvas.width=w;canvas.height=h;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);
  // Draw border
  ctx.strokeStyle='rgba(0,0,0,0.1)';ctx.lineWidth=2;ctx.strokeRect(1,1,w-2,h-2);
  // Diagonal lines for placeholder effect
  ctx.strokeStyle='rgba(0,0,0,0.03)';ctx.lineWidth=1;
  for(let i=-h;i<w+h;i+=40){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i+h,h);ctx.stroke()}
  // Text
  ctx.fillStyle=fg;ctx.font=`${fontSize}px Inter, sans-serif`;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(text,w/2,h/2);
}
function setSize(w,h){document.getElementById('width').value=w;document.getElementById('height').value=h;update()}
function download(){
  const canvas=document.getElementById('canvas');
  const format=document.getElementById('format').value;
  const mime=format==='jpeg'?'image/jpeg':format==='webp'?'image/webp':'image/png';
  const link=document.createElement('a');link.download=`placeholder.${format}`;
  link.href=canvas.toDataURL(mime,0.95);link.click();toast('Downloaded!');
}
function copyDataURL(){
  const canvas=document.getElementById('canvas');
  navigator.clipboard.writeText(canvas.toDataURL('image/png'));toast('Data URL copied!');
}
update();
</script>
</body>
</html>
