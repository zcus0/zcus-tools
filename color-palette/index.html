<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Palette Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#FF6B00;--bg:#0f0f0f;--card:#1a1a1a;--border:#2a2a2a;--text:#e0e0e0;--muted:#888}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:16px}
header a{color:var(--accent);text-decoration:none;font-size:14px}
header h1{font-size:18px;font-weight:600}
header .icon{font-size:24px}
.container{max-width:900px;margin:0 auto;padding:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:20px}
.btn{background:var(--accent);color:#fff;border:none;padding:12px 24px;border-radius:8px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-outline{background:transparent;border:1px solid var(--accent);color:var(--accent)}
.btn-outline:hover{background:var(--accent);color:#fff}
.palette{display:flex;border-radius:12px;overflow:hidden;min-height:200px;margin-bottom:16px}
.color-col{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;padding:16px 8px;cursor:pointer;position:relative;transition:flex .2s}
.color-col:hover{flex:1.3}
.color-col span{font-size:12px;font-weight:600;padding:4px 8px;border-radius:4px;background:rgba(0,0,0,.5);color:#fff;text-transform:uppercase;letter-spacing:.5px}
.color-details{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-top:12px}
.detail-box{background:var(--bg);padding:12px;border-radius:8px;text-align:center;font-size:13px;cursor:pointer;border:1px solid var(--border);transition:border-color .2s}
.detail-box:hover{border-color:var(--accent)}
.detail-box .label{color:var(--muted);font-size:11px;margin-bottom:4px}
.detail-box .value{font-weight:600;font-family:monospace;font-size:13px}
.detail-box .copied{color:var(--accent);font-size:11px;display:none}
.actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}
.export-options{display:none;margin-top:16px}
.export-options textarea{width:100%;height:150px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:monospace;font-size:12px;padding:12px;resize:vertical}
.export-tabs{display:flex;gap:8px;margin-bottom:12px}
.export-tab{padding:8px 16px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;font-size:13px;font-family:'Inter',sans-serif}
.export-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.history{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
.history-palette{display:flex;border-radius:6px;overflow:hidden;cursor:pointer;height:40px;width:120px;transition:transform .2s}
.history-palette:hover{transform:scale(1.05)}
.history-palette div{flex:1}
.toast{position:fixed;bottom:24px;right:24px;background:var(--accent);color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;font-weight:500;opacity:0;transform:translateY(20px);transition:all .3s;z-index:9999;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
</style>
</head>
<body>
<header>
  <a href="/"><span class="icon">🏠</span> ← Home</a>
  <h1><span class="icon">🎨</span> Color Palette Generator</h1>
</header>
<div class="container">
  <div class="card">
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <button class="btn" onclick="generatePalette()">🎲 Generate Palette</button>
      <button class="btn btn-outline" onclick="toggleLock()" id="lockBtn">🔒 Lock</button>
    </div>
    <div class="palette" id="palette"></div>
    <div class="color-details" id="details"></div>
  </div>
  <div class="card">
    <h3 style="margin-bottom:12px;font-size:15px">📤 Export</h3>
    <div class="export-tabs">
      <button class="export-tab active" onclick="showExport('css',this)">CSS Variables</button>
      <button class="export-tab" onclick="showExport('tailwind',this)">Tailwind Config</button>
      <button class="export-tab" onclick="showExport('image',this)">As Image</button>
    </div>
    <div class="export-options" id="exportArea">
      <textarea id="exportCode" readonly></textarea>
      <div class="actions" style="margin-top:12px">
        <button class="btn" onclick="copyExport()">📋 Copy</button>
      </div>
    </div>
    <canvas id="exportCanvas" style="display:none"></canvas>
  </div>
  <div class="card">
    <h3 style="margin-bottom:12px;font-size:15px">📜 History</h3>
    <div class="history" id="history"></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let currentPalette=[];
let locked=new Set();
let historyList=[];
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function randColor(){return '#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0')}
function hexToRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return{r,g,b}}
function rgbToHsl(r,g,b){r/=255;g/=255;b/=255;const max=Math.max(r,g,b),min=Math.min(r,g,b);let h,s,l=(max+min)/2;if(max===min){h=s=0}else{const d=max-min;s=l>.5?d/(2-max-min):d/(max+min);switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break}}return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)}}
function generatePalette(){
  const colors=[];
  for(let i=0;i<5;i++){colors.push(locked.has(i)?currentPalette[i]:randColor())}
  currentPalette=colors;
  render();
  historyList.unshift([...colors]);
  if(historyList.length>20)historyList.pop();
  renderHistory();
}
function render(){
  const p=document.getElementById('palette');
  const d=document.getElementById('details');
  p.innerHTML='';d.innerHTML='';
  currentPalette.forEach((c,i)=>{
    const col=document.createElement('div');
    col.className='color-col';
    col.style.backgroundColor=c;
    col.style.color=isLight(c)?'#000':'#fff';
    col.innerHTML=`<span>${c}</span>`;
    col.onclick=()=>copyVal(c);
    p.appendChild(col);
    const rgb=hexToRgb(c);
    const hsl=rgbToHsl(rgb.r,rgb.g,rgb.b);
    [{l:'HEKSE',v:c},{l:'RGB',v:`rgb(${rgb.r},${rgb.g},${rgb.b})`},{l:'HSL',v:`hsl(${hsl.h},${hsl.s}%,${hsl.l}%)`}].forEach(item=>{
      const box=document.createElement('div');
      box.className='detail-box';
      box.innerHTML=`<div class="label">${item.l}</div><div class="value">${item.v}</div>`;
      box.onclick=()=>copyVal(item.v);
      d.appendChild(box);
    });
  });
  document.getElementById('exportArea').style.display='block';
  showExport(document.querySelector('.export-tab.active')?.textContent.toLowerCase().includes('css')?'css':document.querySelector('.export-tab.active')?.textContent.toLowerCase().includes('tail')?'tailwind':'image',document.querySelector('.export-tab.active'));
}
function isLight(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return(r*299+g*587+b*114)/1000>186}
function toggleLock(){
  const i=prompt('Lock which color index? (0-4)');
  if(i!==null&&i>=0&&i<=4){locked.has(parseInt(i))?locked.delete(parseInt(i)):locked.add(parseInt(i));toast(locked.has(parseInt(i))?`Color ${i} locked`:`Color ${i} unlocked`)}
}
function copyVal(v){navigator.clipboard.writeText(v).then(()=>toast('Copied: '+v)).catch(()=>toast('Copy failed'))}
function renderHistory(){
  const h=document.getElementById('history');
  h.innerHTML='';
  historyList.forEach(palette=>{
    const div=document.createElement('div');
    div.className='history-palette';
    palette.forEach(c=>{const s=document.createElement('div');s.style.backgroundColor=c;div.appendChild(s)});
    div.onclick=()=>{currentPalette=[...palette];locked.clear();render()};
    h.appendChild(div);
  });
}
function showExport(type,btn){
  document.querySelectorAll('.export-tab').forEach(t=>t.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const area=document.getElementById('exportArea');
  const code=document.getElementById('exportCode');
  const canvas=document.getElementById('exportCanvas');
  if(type==='image'){
    code.style.display='none';
    canvas.style.display='block';
    canvas.width=800;canvas.height=200;
    const ctx=canvas.getContext('2d');
    currentPalette.forEach((c,i)=>{
      ctx.fillStyle=c;ctx.fillRect(i*160,0,160,200);
    });
  } else {
    code.style.display='block';
    canvas.style.display='none';
    if(type==='css'){
      code.value=':root {\n'+currentPalette.map((c,i)=>`  --color-${i+1}: ${c};`).join('\n')+'\n}';
    } else {
      code.value='// tailwind.config.js\nmodule.exports={\n  theme:{\n    extend:{\n      colors:{\n'+currentPalette.map((c,i)=>`        palette${i+1}:"${c}",`).join('\n')+'\n      }\n    }\n  }\n}';
    }
  }
}
function copyExport(){
  const code=document.getElementById('exportCode');
  if(code.style.display!=='none'){navigator.clipboard.writeText(code.value).then(()=>toast('Copied!')).catch(()=>toast('Copy failed'))}
  else{
    const canvas=document.getElementById('exportCanvas');
    canvas.toBlob(b=>{navigator.clipboard.write([new ClipboardItem({'image/png':b})]).then(()=>toast('Image copied!')).catch(()=>toast('Copy failed'))});
  }
}
generatePalette();
</script>
</body>
</html>
