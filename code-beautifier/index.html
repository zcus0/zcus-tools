<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Beautifier</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f5f5;color:#333}
.header{background:#fff;padding:16px 24px;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.header a{color:#FF6B00;text-decoration:none;font-weight:600}
.header h1{font-size:20px;font-weight:700}
.header .icon{font-size:24px}
.container{max-width:900px;margin:24px auto;padding:0 16px}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card h2{font-size:16px;font-weight:600;margin-bottom:12px}
textarea{width:100%;height:220px;border:1px solid #e0e0e0;border-radius:8px;padding:12px;font-family:monospace;font-size:13px;resize:vertical}
textarea:focus{outline:2px solid #FF6B00;border-color:#FF6B00}
.btn{background:#FF6B00;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-family:'Inter';font-weight:600;font-size:14px;cursor:pointer}
.btn:hover{opacity:.9}
.btn-secondary{background:#eee;color:#333}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.lang-tag{display:inline-block;background:#FF6B00;color:#fff;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600;margin-bottom:8px}
pre{background:#1e1e1e;color:#d4d4d4;padding:16px;border-radius:8px;overflow-x:auto;font-size:13px;line-height:1.5;max-height:400px;overflow-y:auto}
.toast{position:fixed;bottom:24px;right:24px;background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:1000;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header"><a href="/">← Home</a><span class="icon">✨</span><h1>Code Beautifier</h1></div>
<div class="container">
<div class="card">
<h2>Input Code</h2>
<textarea id="input" placeholder="Paste HTML, CSS, or JavaScript code..."></textarea>
<div id="langTag" class="lang-tag" style="display:none"></div>
<div class="btn-row">
<button class="btn" onclick="beautify()">Beautify</button>
<button class="btn btn-secondary" onclick="copyResult()">📋 Copy Result</button>
</div>
</div>
<div class="card" id="resultCard" style="display:none">
<h2>Formatted Output</h2>
<pre id="output"></pre>
</div>
</div>
<div id="toast" class="toast"></div>
<script>
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function detectLang(code){
const c=code.trim();
if(/<\s*(!DOCTYPE|html|head|body|div|span|script|style|link|meta|table|form|input|img|a |p |h[1-6])/i.test(c))return'html';
if(/(var|let|const|function|=>|import |export |class |console\.)/.test(c))return'javascript';
if(/[\{\}].*:/c.test(c)&&/[.#]/.test(c))return'css';
if(/^\s*\{[\s\S]*"[\w]+"\s*:/m.test(c))return'json';
return'text';
}
function indentCode(code,lang){
const lines=code.replace(/\r\n?/g,'\n').split('\n');
let out='';let depth=0;const tab='    ';
const open=/[\{\[\(]/,close=/[\}\]\)]/;
const isSingleOpen=/\b(if|else|for|while|function|do|switch|try|catch)\b.*\(\s*$/;
for(let line of lines){
const trimmed=line.trim();
if(!trimmed){out+='\n';continue}
// Decrease indent if line starts with closing bracket
if(close.test(trimmed[0])&&depth>0)depth--;
out+=tab.repeat(depth)+trimmed+'\n';
// Increase indent after opening bracket
const opens=(trimmed.match(/[\{\[\(]/g)||[]).length;
const closes=(trimmed.match(/[\}\]\)]/g)||[]).length;
depth+=opens-closes;
depth=Math.max(0,depth);
}
return out.trim();
}
function beautify(){
const code=document.getElementById('input').value;
if(!code.trim())return toast('Paste some code first');
const lang=detectLang(code);
document.getElementById('langTag').textContent=lang.toUpperCase();
document.getElementById('langTag').style.display='inline-block';
let formatted=indentCode(code,lang);
// JSON formatting
if(lang==='json'){try{formatted=JSON.stringify(JSON.parse(code),null,4)}catch(e){formatted=indentCode(code,'json')}}
document.getElementById('output').textContent=formatted;
document.getElementById('resultCard').style.display='block';
toast('Beautified as '+lang.toUpperCase()+'!');
}
function copyResult(){
const text=document.getElementById('output').textContent;
navigator.clipboard.writeText(text).then(()=>toast('Copied!'));
}
</script>
</body>
</html>
