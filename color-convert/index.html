<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Converter</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f5f5;color:#333;min-height:100vh}
.header{background:#fff;border-bottom:1px solid #e0e0e0;padding:16px 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.header a{color:#FF6B00;text-decoration:none;font-weight:500;font-size:14px}
.header .icon{font-size:24px}
.header h1{font-size:18px;font-weight:600;flex:1}
.container{max-width:800px;margin:0 auto;padding:24px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.06);padding:24px;margin-bottom:20px}
.card h2{font-size:16px;font-weight:600;margin-bottom:16px}
.btn{padding:8px 16px;border:none;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;transition:all .2s}
.btn-primary{background:#FF6B00;color:#fff}.btn-primary:hover{background:#e55a00}
.btn-outline{background:transparent;border:1px solid #ddd;color:#555}.btn-outline:hover{border-color:#FF6B00;color:#FF6B00}
.btn-sm{padding:5px 10px;font-size:12px}
input[type=text],input[type=number]{font-family:'Inter',sans-serif;font-size:14px;padding:10px 12px;border:1px solid #ddd;border-radius:8px;outline:none;width:100%}
input:focus{border-color:#FF6B00}
label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:#555}
.toast{position:fixed;bottom:24px;right:24px;background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
.color-preview{width:100%;height:120px;border-radius:12px;border:1px solid #eee;margin-bottom:16px}
.format-row{display:flex;gap:8px;align-items:center;margin-bottom:12px;padding:12px;background:#f9f9f9;border-radius:8px;border:1px solid #eee}
.format-row .label{font-weight:600;font-size:12px;color:#FF6B00;min-width:60px;text-transform:uppercase}
.format-row input{flex:1;border:1px solid #ddd;border-radius:6px;padding:8px 12px;font-family:'Inter',sans-serif;font-size:13px;outline:none}
.format-row input:focus{border-color:#FF6B00}
.format-row .btn{padding:6px 12px;font-size:12px;white-space:nowrap}
.main-input{display:flex;gap:12px;align-items:center;margin-bottom:16px}
.main-input input[type=color]{width:60px;height:50px;padding:4px;border:2px solid #ddd;border-radius:8px;cursor:pointer}
.main-input input[type=text]{flex:1;font-size:18px;font-weight:600;padding:12px 16px}
</style>
</head>
<body>
<div class="header">
  <a href="/">← Home</a>
  <span class="icon">🎨</span>
  <h1>Color Converter</h1>
</div>
<div class="container">
  <div class="card">
    <h2>Color Input</h2>
    <div class="main-input">
      <input type="color" id="picker" value="#FF6B00" oninput="fromPicker()">
      <input type="text" id="hex-input" value="#FF6B00" oninput="fromHex()">
    </div>
    <div class="color-preview" id="preview" style="background:#FF6B00"></div>
  </div>
  <div class="card">
    <h2>All Formats</h2>
    <div class="format-row">
      <div class="label">HEX</div>
      <input type="text" id="hex" readonly>
      <button class="btn btn-outline btn-sm" onclick="copy('hex')">Copy</button>
    </div>
    <div class="format-row">
      <div class="label">RGB</div>
      <input type="text" id="rgb" readonly>
      <button class="btn btn-outline btn-sm" onclick="copy('rgb')">Copy</button>
    </div>
    <div class="format-row">
      <div class="label">HSL</div>
      <input type="text" id="hsl" readonly>
      <button class="btn btn-outline btn-sm" onclick="copy('hsl')">Copy</button>
    </div>
    <div class="format-row">
      <div class="label">HSV</div>
      <input type="text" id="hsv" readonly>
      <button class="btn btn-outline btn-sm" onclick="copy('hsv')">Copy</button>
    </div>
    <div class="format-row">
      <div class="label">CMYK</div>
      <input type="text" id="cmyk" readonly>
      <button class="btn btn-outline btn-sm" onclick="copy('cmyk')">Copy</button>
    </div>
    <div class="format-row">
      <div class="label">CSS</div>
      <input type="text" id="css" readonly>
      <button class="btn btn-outline btn-sm" onclick="copy('css')">Copy</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function hexToRgb(h){const r=parseInt(h.slice(1,3),16);const g=parseInt(h.slice(3,5),16);const b=parseInt(h.slice(5,7),16);return{r,g,b}}
function rgbToHex(r,g,b){return'#'+[r,g,b].map(x=>Math.round(x).toString(16).padStart(2,'0')).join('')}
function rgbToHsl(r,g,b){r/=255;g/=255;b/=255;const max=Math.max(r,g,b),min=Math.min(r,g,b);let h,s,l=(max+min)/2;if(max===min){h=s=0}else{const d=max-min;s=l>0.5?d/(2-max-min):d/(max+min);switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break}}return{h:Math.round(h*360),s:Math.round(s*100),l:Math.round(l*100)}}
function rgbToHsv(r,g,b){r/=255;g/=255;b/=255;const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;let h,s=max===0?0:d/max,v=max;if(max===min){h=0}else{switch(max){case r:h=((g-b)/d+(g<b?6:0))/6;break;case g:h=((b-r)/d+2)/6;break;case b:h=((r-g)/d+4)/6;break}}return{h:Math.round(h*360),s:Math.round(s*100),v:Math.round(v*100)}}
function rgbToCmyk(r,g,b){r/=255;g/=255;b/=255;const k=1-Math.max(r,g,b);if(k===1)return{c:0,m:0,y:0,k:100};return{c:Math.round((1-r-k)/(1-k)*100),m:Math.round((1-g-k)/(1-k)*100),y:Math.round((1-b-k)/(1-k)*100),k:Math.round(k*100)}}
function fromPicker(){
  const hex=document.getElementById('picker').value;
  document.getElementById('hex-input').value=hex;
  updateAll(hex);
}
function fromHex(){
  let hex=document.getElementById('hex-input').value.trim();
  if(!hex.startsWith('#'))hex='#'+hex;
  if(/^#[0-9a-fA-F]{6}$/.test(hex)){document.getElementById('picker').value=hex;updateAll(hex)}
}
function updateAll(hex){
  document.getElementById('preview').style.background=hex;
  const{r,g,b}=hexToRgb(hex);
  document.getElementById('hex').value=hex.toUpperCase();
  document.getElementById('rgb').value=`rgb(${r}, ${g}, ${b})`;
  const hsl=rgbToHsl(r,g,b);document.getElementById('hsl').value=`hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
  const hsv=rgbToHsv(r,g,b);document.getElementById('hsv').value=`hsv(${hsv.h}, ${hsv.s}%, ${hsv.v}%)`;
  const cmyk=rgbToCmyk(r,g,b);document.getElementById('cmyk').value=`cmyk(${cmyk.c}%, ${cmyk.m}%, ${cmyk.y}%, ${cmyk.k}%)`;
  document.getElementById('css').value=hex;
}
function copy(id){navigator.clipboard.writeText(document.getElementById(id).value);toast('Copied!')}
updateAll('#FF6B00');
</script>
</body>
</html>
