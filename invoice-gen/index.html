<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;padding:16px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.header a{color:#FF6B00;text-decoration:none;font-size:14px}
.header h1{font-size:20px;font-weight:700}
.header span{font-size:24px}
.container{max-width:800px;margin:0 auto}
.card{background:#16213e;border-radius:12px;padding:24px;border:1px solid #233554;margin-bottom:16px}
label{display:block;color:#888;font-size:12px;margin-bottom:4px}
input{width:100%;padding:10px;background:#0f0f23;border:1px solid #233554;border-radius:8px;color:#fff;font-family:'Inter',sans-serif;font-size:14px;margin-bottom:10px}
input:focus{outline:none;border-color:#FF6B00}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{padding:10px 20px;background:#FF6B00;border:none;color:#fff;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.btn:hover{background:#e65c00}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-secondary{background:#233554}
.btn-success{background:#00b894}
.items-table{width:100%;border-collapse:collapse;margin-top:12px}
.items-table th{text-align:left;padding:8px;font-size:12px;color:#888;border-bottom:1px solid #233554}
.items-table td{padding:6px}
.items-table input{margin:0;padding:8px;font-size:13px}
.items-table .amt{font-weight:600;color:#FF6B00;text-align:right;min-width:80px}
.add-item-btn{margin-top:8px;font-size:13px}
.totals{text-align:right;margin-top:16px}
.totals div{padding:4px 0;font-size:14px}
.totals .grand{font-size:20px;font-weight:700;color:#FF6B00;border-top:2px solid #FF6B00;padding-top:8px;margin-top:8px}
.inv-preview{background:#fff;color:#333;padding:32px;border-radius:8px;margin-top:16px}
.inv-preview h2{color:#FF6B00;margin-bottom:16px}
.inv-preview table{width:100%;border-collapse:collapse}
.inv-preview th{background:#f5f5f5;padding:8px;font-size:12px;text-align:left;border-bottom:2px solid #ddd}
.inv-preview td{padding:8px;border-bottom:1px solid #eee;font-size:13px}
.inv-preview .total-row{font-weight:700;font-size:16px}
@media print{body{background:#fff}.header,.card:first-child,.btn,.container>.card:first-of-type{display:none!important}.inv-preview{box-shadow:none;padding:0}}
.toast{position:fixed;bottom:20px;right:20px;background:#FF6B00;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header"><a href="/">← Home</a><span>🧾</span><h1>Invoice Generator</h1></div>
<div class="container">
<div class="card">
<div class="form-grid">
<div><label>Your Business Name</label><input type="text" id="bizName" placeholder="My Business"></div>
<div><label>Invoice Number</label><input type="text" id="invNum" value="INV-001"></div>
</div>
<div class="form-grid">
<div><label>Client Name</label><input type="text" id="clientName" placeholder="Client name"></div>
<div><label>Client Email</label><input type="text" id="clientEmail" placeholder="client@email.com"></div>
</div>
<label>Client Address</label><input type="text" id="clientAddr" placeholder="123 Main St, City">
<div class="form-grid">
<div><label>Invoice Date</label><input type="date" id="invDate"></div>
<div><label>Due Date</label><input type="date" id="dueDate"></div>
</div>
</div>
<div class="card">
<h3 style="font-size:14px;color:#888;margin-bottom:8px">Line Items</h3>
<table class="items-table">
<thead><tr><th>Description</th><th style="width:60px">Qty</th><th style="width:80px">Rate</th><th style="width:90px">Amount</th><th></th></tr></thead>
<tbody id="itemRows"></tbody>
</table>
<button class="btn btn-sm btn-secondary add-item-btn" onclick="addItem()">+ Add Item</button>
<div class="form-grid" style="max-width:200px;margin-top:12px">
<div><label>Tax %</label><input type="number" id="taxRate" value="0" min="0" onchange="calcTotals()"></div>
<div><label>Discount %</label><input type="number" id="discRate" value="0" min="0" onchange="calcTotals()"></div>
</div>
<div class="totals">
<div>Subtotal: <span id="subtotal">$0.00</span></div>
<div>Discount: <span id="discAmt">-$0.00</span></div>
<div>Tax: <span id="taxAmt">$0.00</span></div>
<div class="grand">Total: <span id="grandTotal">$0.00</span></div>
</div>
<div style="margin-top:16px;display:flex;gap:8px">
<button class="btn" onclick="generatePreview()">Preview</button>
<button class="btn btn-success" onclick="window.print()">🖨 Print/PDF</button>
</div>
</div>
<div id="previewArea"></div>
</div>
<div class="toast" id="toast"></div>
<script>
let items=[{desc:'',qty:1,rate:0}];
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function renderItems(){document.getElementById('itemRows').innerHTML=items.map((it,i)=>`<tr><td><input value="${it.desc}" placeholder="Item description" onchange="items[${i}].desc=this.value;calcTotals()"></td><td><input type="number" value="${it.qty}" min="1" onchange="items[${i}].qty=+this.value;calcTotals()"></td><td><input type="number" value="${it.rate}" min="0" step="0.01" onchange="items[${i}].rate=+this.value;calcTotals()"></td><td class="amt">$${(it.qty*it.rate).toFixed(2)}</td><td><button class="btn btn-sm btn-secondary" onclick="items.splice(${i},1);renderItems();calcTotals()">✕</button></td></tr>`).join('')}
function addItem(){items.push({desc:'',qty:1,rate:0});renderItems()}
function calcTotals(){
let sub=0;items.forEach(it=>{const amt=it.qty*it.rate;sub+=amt;const el=document.querySelector(`#itemRows tr:nth-child(${items.indexOf(it)+1}) .amt`);if(el)el.textContent='$'+amt.toFixed(2)});
const disc=parseFloat(document.getElementById('discRate').value)||0;const tax=parseFloat(document.getElementById('taxRate').value)||0;
const discVal=sub*disc/100;const afterDisc=sub-discVal;const taxVal=afterDisc*tax/100;const total=afterDisc+taxVal;
document.getElementById('subtotal').textContent='$'+sub.toFixed(2);document.getElementById('discAmt').textContent='-$'+discVal.toFixed(2);
document.getElementById('taxAmt').textContent='$'+taxVal.toFixed(2);document.getElementById('grandTotal').textContent='$'+total.toFixed(2)}
function generatePreview(){
const sub=items.reduce((s,it)=>s+it.qty*it.rate,0);const disc=parseFloat(document.getElementById('discRate').value)||0;const tax=parseFloat(document.getElementById('taxRate').value)||0;
const discVal=sub*disc/100;const afterDisc=sub-discVal;const taxVal=afterDisc*tax/100;const total=afterDisc+taxVal;
document.getElementById('previewArea').innerHTML=`<div class="inv-preview"><div style="display:flex;justify-content:space-between"><div><h2>INVOICE</h2><p>${document.getElementById('bizName').value||'Business Name'}</p></div><div style="text-align:right"><p><strong>${document.getElementById('invNum').value}</strong></p><p>Date: ${document.getElementById('invDate').value}</p><p>Due: ${document.getElementById('dueDate').value}</p></div></div><hr style="margin:16px 0;border-color:#eee"><div style="margin-bottom:16px"><strong>Bill To:</strong><br>${document.getElementById('clientName').value}<br>${document.getElementById('clientEmail').value}<br>${document.getElementById('clientAddr').value}</div><table><thead><tr><th>Description</th><th>Qty</th><th>Rate</th><th style="text-align:right">Amount</th></tr></thead><tbody>${items.map(it=>`<tr><td>${it.desc}</td><td>${it.qty}</td><td>$${it.rate.toFixed(2)}</td><td style="text-align:right">$${(it.qty*it.rate).toFixed(2)}</td></tr>`).join('')}</tbody></table><div style="text-align:right;margin-top:16px;font-size:14px"><p>Subtotal: $${sub.toFixed(2)}</p><p>Discount: -$${discVal.toFixed(2)}</p><p>Tax (${tax}%): $${taxVal.toFixed(2)}</p><p class="total-row" style="color:#FF6B00">Total: $${total.toFixed(2)}</p></div></div>`;toast('Preview generated')}
document.getElementById('invDate').value=new Date().toISOString().split('T')[0];
renderItems();calcTotals();
</script>
</body>
</html>
