<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Binary Converter</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f5f5;color:#333}
.header{background:#fff;padding:16px 24px;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.header a{color:#FF6B00;text-decoration:none;font-weight:600}
.header h1{font-size:20px;font-weight:700}
.header .icon{font-size:24px}
.container{max-width:800px;margin:24px auto;padding:0 16px}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card h2{font-size:16px;font-weight:600;margin-bottom:12px}
textarea{width:100%;height:100px;border:1px solid #e0e0e0;border-radius:8px;padding:12px;font-family:monospace;font-size:14px;resize:vertical}
textarea:focus{outline:2px solid #FF6B00;border-color:#FF6B00}
.btn{background:#FF6B00;color:#fff;border:none;padding:10px 20px;border-radius:8px;font-family:'Inter';font-weight:600;font-size:14px;cursor:pointer}
.btn:hover{opacity:.9}
.btn-secondary{background:#eee;color:#333}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.result-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:12px}
.result-item{background:#f8f8f8;border-radius:8px;padding:12px}
.result-label{font-weight:600;font-size:12px;color:#FF6B00;margin-bottom:4px}
.result-value{font-family:monospace;font-size:14px;word-break:break-all;user-select:all}
.copy-btn{background:none;border:none;cursor:pointer;font-size:14px;float:right}
.toast{position:fixed;bottom:24px;right:24px;background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:1000;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header"><a href="/">← Home</a><span class="icon">💾</span><h1>Binary Converter</h1></div>
<div class="container">
<div class="card">
<h2>Text ↔ Binary</h2>
<textarea id="textInput" placeholder="Enter text..."></textarea>
<div class="btn-row">
<button class="btn" onclick="textToBinary()">Text → Binary</button>
<button class="btn btn-secondary" onclick="binaryToText()">Binary → Text</button>
</div>
<textarea id="binaryOutput" placeholder="Binary output..."></textarea>
<div class="btn-row">
<button class="btn btn-secondary" onclick="copy(document.getElementById('binaryOutput').value)">📋 Copy</button>
<button class="btn btn-secondary" onclick="copy(document.getElementById('textInput').value)">📋 Copy Text</button>
</div>
</div>
<div class="card">
<h2>Number Converter</h2>
<textarea id="numInput" placeholder="Enter a decimal number..." style="height:60px"></textarea>
<div class="result-grid" id="numResults"></div>
<div class="btn-row">
<button class="btn" onclick="convertNumber()">Convert All</button>
</div>
</div>
</div>
<div id="toast" class="toast"></div>
<script>
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function textToBinary(){
const text=document.getElementById('textInput').value;
if(!text)return toast('Enter text');
const binary=[...text].map(c=>c.charCodeAt(0).toString(2).padStart(8,'0')).join(' ');
document.getElementById('binaryOutput').value=binary;
toast('Converted!');
}
function binaryToText(){
const bin=document.getElementById('binaryOutput').value;
if(!bin)return toast('Enter binary');
try{
const bytes=bin.trim().split(/\s+/);
const text=bytes.map(b=>String.fromCharCode(parseInt(b,2))).join('');
document.getElementById('textInput').value=text;
toast('Converted!');
}catch(e){toast('Invalid binary')}
}
function convertNumber(){
const val=document.getElementById('numInput').value.trim();
if(!val)return toast('Enter a number');
try{
const num=parseInt(val);
if(isNaN(num))throw 0;
const results=document.getElementById('numResults');
const bases=[
{label:'Decimal',val:num.toString(10)},{label:'Binary',val:num.toString(2)},
{label:'Octal',val:num.toString(8)},{label:'Hexadecimal',val:num.toString(16).toUpperCase()},
{label:'ASCII',val:num>=32&&num<=126?String.fromCharCode(num):'(non-printable)'}
];
results.innerHTML=bases.map(b=>`<div class="result-item"><button class="copy-btn" onclick="copy('${b.val}')">📋</button><div class="result-label">${b.label}</div><div class="result-value">${b.val}</div></div>`).join('');
}catch(e){toast('Invalid number')}
}
function copy(v){navigator.clipboard.writeText(v).then(()=>toast('Copied!'))}
</script>
</body>
</html>
