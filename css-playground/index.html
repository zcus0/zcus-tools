<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Playground</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--accent:#FF6B00;--bg:#0f1117;--card:#1a1d27;--border:#2a2d3a;--text:#e4e4e7;--muted:#71717a;--input-bg:#12141c}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
a{color:var(--accent);text-decoration:none}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:16px}
.header .icon{font-size:24px}
.header h1{font-size:18px;font-weight:600;flex:1}
.container{max-width:1000px;margin:0 auto;padding:24px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px}
.card h2{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--accent)}
.preview-area{background:var(--input-bg);border:1px solid var(--border);border-radius:12px;padding:40px;display:flex;justify-content:center;align-items:center;min-height:200px;margin-bottom:16px}
#previewBox{width:150px;height:150px;background:#FF6B00;transition:all .3s;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:600;font-size:14px;border-radius:0}
.control-group{margin-bottom:14px}
.control-group label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px;font-weight:500}
.control-row{display:flex;align-items:center;gap:10px}
input[type=range]{flex:1;accent-color:var(--accent)}
input[type=text],input[type=number],input[type=color]{background:var(--input-bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-family:inherit;font-size:12px;outline:none}
input[type=color]{width:36px;height:30px;padding:2px;cursor:pointer}
input[type=range]+span{font-size:12px;color:var(--muted);min-width:45px;text-align:right}
button{background:var(--accent);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s}
button:hover{opacity:.85}
button.secondary{background:var(--border);color:var(--text)}
.css-output{background:var(--input-bg);border:1px solid var(--border);border-radius:8px;padding:14px;font-family:monospace;font-size:12px;line-height:1.6;white-space:pre-wrap;position:relative}
.copy-btn{position:absolute;top:8px;right:8px;padding:4px 10px;font-size:11px}
.toast{position:fixed;bottom:24px;right:24px;background:#22c55e;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;z-index:9999;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:600px){.container{padding:16px}.card{padding:16px}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<header class="header">
  <span class="icon">🎨</span>
  <h1>CSS Playground</h1>
  <a href="/">← Home</a>
</header>
<div class="container">
  <div class="preview-area">
    <div id="previewBox">Preview</div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="card">
      <h2>Border Radius</h2>
      <div class="control-group">
        <label>Radius</label>
        <div class="control-row">
          <input type="range" id="br" min="0" max="75" value="0" oninput="update()">
          <span id="brVal">0px</span>
        </div>
      </div>

      <h2>Box Shadow</h2>
      <div class="control-group">
        <label>X Offset</label>
        <div class="control-row">
          <input type="range" id="shadowX" min="-50" max="50" value="0" oninput="update()">
          <span id="shadowXVal">0px</span>
        </div>
      </div>
      <div class="control-group">
        <label>Y Offset</label>
        <div class="control-row">
          <input type="range" id="shadowY" min="-50" max="50" value="4" oninput="update()">
          <span id="shadowYVal">4px</span>
        </div>
      </div>
      <div class="control-group">
        <label>Blur</label>
        <div class="control-row">
          <input type="range" id="shadowBlur" min="0" max="50" value="12" oninput="update()">
          <span id="shadowBlurVal">12px</span>
        </div>
      </div>
      <div class="control-group">
        <label>Shadow Color</label>
        <div class="control-row">
          <input type="color" id="shadowColor" value="#000000" oninput="update()">
          <span style="font-size:12px;color:var(--muted)">Opacity: </span>
          <input type="range" id="shadowOpacity" min="0" max="100" value="30" oninput="update()" style="flex:1">
          <span id="shadowOpVal">30%</span>
        </div>
      </div>

      <h2>Gradient</h2>
      <div class="control-group">
        <label>Color 1</label>
        <div class="control-row">
          <input type="color" id="grad1" value="#FF6B00" oninput="update()">
          <span style="margin:0 4px;font-size:12px;color:var(--muted)">→</span>
          <input type="color" id="grad2" value="#ff0000" oninput="update()">
          <span style="font-size:12px;color:var(--muted);margin-left:8px">Angle:</span>
          <input type="range" id="gradAngle" min="0" max="360" value="135" oninput="update()" style="flex:1">
          <span id="gradAngleVal">135°</span>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Transform</h2>
      <div class="control-group">
        <label>Rotate</label>
        <div class="control-row">
          <input type="range" id="rotate" min="-180" max="180" value="0" oninput="update()">
          <span id="rotateVal">0deg</span>
        </div>
      </div>
      <div class="control-group">
        <label>Scale</label>
        <div class="control-row">
          <input type="range" id="scale" min="50" max="200" value="100" oninput="update()">
          <span id="scaleVal">1</span>
        </div>
      </div>
      <div class="control-group">
        <label>Skew X</label>
        <div class="control-row">
          <input type="range" id="skewX" min="-45" max="45" value="0" oninput="update()">
          <span id="skewXVal">0deg</span>
        </div>
      </div>
      <div class="control-group">
        <label>Skew Y</label>
        <div class="control-row">
          <input type="range" id="skewY" min="-45" max="45" value="0" oninput="update()">
          <span id="skewYVal">0deg</span>
        </div>
      </div>
      <div class="control-group">
        <label>Translate X</label>
        <div class="control-row">
          <input type="range" id="translateX" min="-100" max="100" value="0" oninput="update()">
          <span id="translateXVal">0px</span>
        </div>
      </div>
      <div class="control-group">
        <label>Translate Y</label>
        <div class="control-row">
          <input type="range" id="translateY" min="-100" max="100" value="0" oninput="update()">
          <span id="translateYVal">0px</span>
        </div>
      </div>

      <h2>Transition</h2>
      <div class="control-group">
        <label>Duration</label>
        <div class="control-row">
          <input type="range" id="duration" min="0" max="2000" value="300" step="100" oninput="update()">
          <span id="durationVal">300ms</span>
        </div>
      </div>
      <div class="control-group">
        <label>Timing</label>
        <div class="control-row">
          <select id="timing" onchange="update()" style="background:var(--input-bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:12px;flex:1">
            <option value="ease">ease</option><option value="linear">linear</option><option value="ease-in">ease-in</option>
            <option value="ease-out">ease-out</option><option value="ease-in-out">ease-in-out</option>
          </select>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2>Generated CSS</h2>
    <div class="css-output" id="cssOutput">
      <button class="copy-btn secondary" onclick="copyCss()">📋 Copy</button>
      <code id="cssCode"></code>
    </div>
  </div>
</div>
<script>
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

function update(){
  const br=document.getElementById('br').value;
  const sX=document.getElementById('shadowX').value;
  const sY=document.getElementById('shadowY').value;
  const sB=document.getElementById('shadowBlur').value;
  const sC=document.getElementById('shadowColor').value;
  const sO=(document.getElementById('shadowOpacity').value/100).toFixed(2);
  const g1=document.getElementById('grad1').value;
  const g2=document.getElementById('grad2').value;
  const gA=document.getElementById('gradAngle').value;
  const rot=document.getElementById('rotate').value;
  const sc=(document.getElementById('scale').value/100).toFixed(2);
  const skX=document.getElementById('skewX').value;
  const skY=document.getElementById('skewY').value;
  const tX=document.getElementById('translateX').value;
  const tY=document.getElementById('translateY').value;
  const dur=document.getElementById('duration').value;
  const timing=document.getElementById('timing').value;

  // Update labels
  document.getElementById('brVal').textContent=br+'px';
  document.getElementById('shadowXVal').textContent=sX+'px';
  document.getElementById('shadowYVal').textContent=sY+'px';
  document.getElementById('shadowBlurVal').textContent=sB+'px';
  document.getElementById('shadowOpVal').textContent=Math.round(sO*100)+'%';
  document.getElementById('gradAngleVal').textContent=gA+'°';
  document.getElementById('rotateVal').textContent=rot+'deg';
  document.getElementById('scaleVal').textContent=sc;
  document.getElementById('skewXVal').textContent=skX+'deg';
  document.getElementById('skewYVal').textContent=skY+'deg';
  document.getElementById('translateXVal').textContent=tX+'px';
  document.getElementById('translateYVal').textContent=tY+'px';
  document.getElementById('durationVal').textContent=dur+'ms';

  const box=document.getElementById('previewBox');
  const r=parseInt(sC.slice(1,3),16),g=parseInt(sC.slice(3,5),16),b=parseInt(sC.slice(5,7),16);
  
  box.style.borderRadius=br+'px';
  box.style.boxShadow=`${sX}px ${sY}px ${sB}px rgba(${r},${g},${b},${sO})`;
  box.style.background=`linear-gradient(${gA}deg,${g1},${g2})`;
  box.style.transform=`rotate(${rot}deg) scale(${sc}) skew(${skX}deg,${skY}deg) translate(${tX}px,${tY}px)`;
  box.style.transition=`all ${dur}ms ${timing}`;

  const css=`.element {
  border-radius: ${br}px;
  box-shadow: ${sX}px ${sY}px ${sB}px rgba(${r},${g},${b},${sO});
  background: linear-gradient(${gA}deg, ${g1}, ${g2});
  transform: rotate(${rot}deg) scale(${sc}) skew(${skX}deg, ${skY}deg) translate(${tX}px, ${tY}px);
  transition: all ${dur}ms ${timing};
}`;
  document.getElementById('cssCode').textContent=css;
}

function copyCss(){
  const code=document.getElementById('cssCode').textContent;
  navigator.clipboard.writeText(code).then(()=>toast('CSS copied!'));
}

update();
</script>
</body>
</html>
