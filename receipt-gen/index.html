<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Receipt Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;padding:16px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.header a{color:#FF6B00;text-decoration:none;font-size:14px}
.header h1{font-size:20px;font-weight:700}
.header span{font-size:24px}
.container{max-width:600px;margin:0 auto}
.card{background:#16213e;border-radius:12px;padding:24px;border:1px solid #233554;margin-bottom:16px}
label{display:block;color:#888;font-size:12px;margin-bottom:4px}
input,select{width:100%;padding:10px;background:#0f0f23;border:1px solid #233554;border-radius:8px;color:#fff;font-family:'Inter',sans-serif;font-size:14px;margin-bottom:10px}
input:focus,select:focus{outline:none;border-color:#FF6B00}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{padding:10px 20px;background:#FF6B00;border:none;color:#fff;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.btn:hover{background:#e65c00}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-secondary{background:#233554}
.btn-success{background:#00b894}
.items-row{display:flex;gap:8px;margin-bottom:8px;align-items:end}
.items-row input{margin:0;flex:1}
.items-row .num{max-width:80px;flex:none}
.receipt-preview{background:#fff;color:#333;padding:32px;border-radius:8px;font-family:'Courier New',monospace;font-size:13px;text-align:center;max-width:360px;margin:0 auto;line-height:1.6}
.receipt-preview .store-name{font-size:20px;font-weight:700;margin-bottom:4px}
.receipt-preview .store-info{font-size:11px;color:#666;margin-bottom:12px}
.receipt-preview .divider{border-top:1px dashed #ccc;margin:8px 0}
.receipt-preview .item-row{display:flex;justify-content:space-between}
.receipt-preview .total-row{font-weight:700;font-size:15px;margin-top:4px}
.receipt-preview .footer{font-size:11px;color:#666;margin-top:12px}
@media print{body{background:#fff}.header,.card:first-child,.btn{display:none!important}.receipt-preview{box-shadow:none}}
.toast{position:fixed;bottom:20px;right:20px;background:#FF6B00;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header"><a href="/">← Home</a><span>🧾</span><h1>Receipt Generator</h1></div>
<div class="container">
<div class="card">
<label>Store Name</label><input type="text" id="storeName" placeholder="Store Name" value="My Store">
<div class="form-grid">
<div><label>Store Address</label><input type="text" id="storeAddr" placeholder="123 Main St"></div>
<div><label>Store Phone</label><input type="text" id="storePhone" placeholder="(555) 123-4567"></div>
</div>
<label>Date</label><input type="date" id="receiptDate">
<label>Transaction #</label><input type="text" id="transNum" value="001">
</div>
<div class="card">
<h3 style="font-size:14px;color:#888;margin-bottom:8px">Items</h3>
<div id="itemList"></div>
<button class="btn btn-sm btn-secondary" onclick="addItem()">+ Add Item</button>
<div class="form-grid" style="max-width:300px;margin-top:12px">
<div><label>Tax %</label><input type="number" id="taxRate" value="8" min="0" step="0.1" oninput="calc()"></div>
<div><label>Payment Method</label><select id="payMethod"><option>Cash</option><option>Credit Card</option><option>Debit Card</option><option>Mobile Pay</option></select></div>
</div>
<div style="text-align:right;margin-top:8px;font-size:14px">Subtotal: <strong id="subtotal">$0.00</strong><br>Tax: <strong id="taxAmt">$0.00</strong><br><span style="font-size:18px;color:#FF6B00">Total: <strong id="totalAmt">$0.00</strong></span></div>
<div style="margin-top:16px;display:flex;gap:8px">
<button class="btn" onclick="preview()">Preview</button>
<button class="btn btn-success" onclick="window.print()">🖨 Print</button>
</div>
</div>
<div id="previewArea"></div>
</div>
<div class="toast" id="toast"></div>
<script>
let items=[{name:'',price:0,qty:1}];
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
function renderItems(){document.getElementById('itemList').innerHTML=items.map((it,i)=>`<div class="items-row"><input placeholder="Item name" value="${it.name}" onchange="items[${i}].name=this.value;calc()"><input class="num" type="number" placeholder="Qty" value="${it.qty}" min="1" onchange="items[${i}].qty=+this.value;calc()"><input class="num" type="number" placeholder="Price" value="${it.price}" min="0" step="0.01" onchange="items[${i}].price=+this.value;calc()"><button class="btn btn-sm btn-secondary" onclick="items.splice(${i},1);renderItems();calc()">✕</button></div>`).join('')}
function addItem(){items.push({name:'',price:0,qty:1});renderItems()}
function calc(){
const sub=items.reduce((s,it)=>s+it.price*it.qty,0);
const taxPct=parseFloat(document.getElementById('taxRate').value)||0;const tax=sub*taxPct/100;
document.getElementById('subtotal').textContent='$'+sub.toFixed(2);document.getElementById('taxAmt').textContent='$'+tax.toFixed(2);document.getElementById('totalAmt').textContent='$'+(sub+tax).toFixed(2)}
function preview(){
const sub=items.reduce((s,it)=>s+it.price*it.qty,0);const taxPct=parseFloat(document.getElementById('taxRate').value)||0;const tax=sub*taxPct/100;const total=sub+tax;
const store=document.getElementById('storeName').value||'Store';
const addr=document.getElementById('storeAddr').value;const phone=document.getElementById('storePhone').value;
const date=document.getElementById('receiptDate').value;const trans=document.getElementById('transNum').value;const pay=document.getElementById('payMethod').value;
document.getElementById('previewArea').innerHTML=`<div class="receipt-preview"><div class="store-name">${store}</div><div class="store-info">${addr?'<br>'+addr:''}${phone?'<br>'+phone:''}</div><div class="divider"></div><div style="font-size:11px;color:#888">Date: ${date}<br>Trans #: ${trans}</div><div class="divider"></div>${items.map(it=>`<div class="item-row"><span>${it.name} x${it.qty}</span><span>$${(it.price*it.qty).toFixed(2)}</span></div>`).join('')}<div class="divider"></div><div class="item-row"><span>Subtotal</span><span>$${sub.toFixed(2)}</span></div><div class="item-row"><span>Tax (${taxPct}%)</span><span>$${tax.toFixed(2)}</span></div><div class="divider"></div><div class="item-row total-row"><span>TOTAL</span><span>$${total.toFixed(2)}</span></div><div class="divider"></div><div style="font-size:12px;margin-top:8px">Payment: ${pay}</div><div class="footer">Thank you for your purchase!</div></div>`}
document.getElementById('receiptDate').value=new Date().toISOString().split('T')[0];
renderItems();calc();
</script>
</body>
</html>
