<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#1a1a2e;color:#fff;min-height:100vh;padding:16px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.header a{color:#FF6B00;text-decoration:none;font-size:14px}
.header h1{font-size:20px;font-weight:700}
.header span{font-size:24px}
.container{max-width:1000px;margin:0 auto}
.card{background:#16213e;border-radius:12px;padding:24px;border:1px solid #233554;margin-bottom:16px}
.sql-editor{width:100%;min-height:120px;padding:16px;background:#0f0f23;border:1px solid #233554;border-radius:8px;color:#f8f8f2;font-family:'Courier New',monospace;font-size:14px;resize:vertical;line-height:1.5}
.sql-editor:focus{outline:none;border-color:#FF6B00}
.btn{padding:10px 20px;background:#FF6B00;border:none;color:#fff;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.btn:hover{background:#e65c00}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-secondary{background:#233554}
.schema-display{background:#0f0f23;border-radius:8px;padding:12px;font-family:'Courier New',monospace;font-size:12px;max-height:200px;overflow-y:auto;line-height:1.6}
.schema-table{margin-bottom:8px}
.schema-table .tname{color:#FF6B00;font-weight:600}
.schema-col{color:#888;padding-left:12px}
.schema-col .ctype{color:#3498db}
.results-table{width:100%;border-collapse:collapse;margin-top:12px;font-size:13px}
.results-table th{background:#0f0f23;padding:8px;text-align:left;border-bottom:2px solid #FF6B00;font-weight:600;position:sticky;top:0}
.results-table td{padding:6px 8px;border-bottom:1px solid #233554}
.results-table tr:hover{background:#233554}
.results-wrap{max-height:300px;overflow:auto;border-radius:8px;border:1px solid #233554}
.message{padding:10px;border-radius:6px;font-size:13px;margin-top:8px}
.msg-success{background:#0e4429;color:#39d353}
.msg-error{background:#3d1f1f;color:#e74c3c}
.msg-info{background:#1a1a3e;color:#6c5ce7}
.toast{position:fixed;bottom:20px;right:20px;background:#FF6B00;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:9999;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header"><a href="/">← Home</a><span>🗄️</span><h1>SQL Editor</h1></div>
<div class="container">
<div class="card">
<h3 style="font-size:14px;color:#888;margin-bottom:8px">Schema</h3>
<div class="schema-display" id="schemaDisplay">Loading sql.js...</div>
</div>
<div class="card">
<textarea class="sql-editor" id="sqlInput" placeholder="SELECT * FROM users LIMIT 10;">SELECT * FROM users LIMIT 10;</textarea>
<div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap">
<button class="btn" onclick="runQuery()">▶ Execute</button>
<button class="btn btn-sm btn-secondary" onclick="loadSampleData()">Load Sample Data</button>
<button class="btn btn-sm btn-secondary" onclick="exportResults()">Export CSV</button>
<button class="btn btn-sm btn-secondary" onclick="clearDB()">Clear DB</button>
</div>
<div id="message"></div>
</div>
<div class="card">
<h3 style="font-size:14px;color:#888;margin-bottom:8px">Results</h3>
<div class="results-wrap" id="resultsWrap"><div style="color:#555;text-align:center;padding:20px">Run a query to see results</div></div>
</div>
</div>
<div class="toast" id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
<script>
let db,lastResults=[];
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
async function initDB(){const SQL=await initSqlJs({locateFile:f=>`https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${f}`});db=new SQL.Database();showSchema();toast('SQL.js loaded')}
function showSchema(){
const tables=db.exec("SELECT name FROM sqlite_master WHERE type='table' ORDER BY name");
let html='';if(tables.length&&tables[0].values.length){
tables[0].values.forEach(([tname])=>{
const cols=db.exec(`PRAGMA table_info('${tname}')`);
html+=`<div class="schema-table"><div class="tname">📋 ${tname}</div>`;
if(cols.length)cols[0].values.forEach(([cid,name,type,notnull,def,pk])=>{
html+=`<div class="schema-col">${pk?'🔑 ':''}${name} <span class="ctype">${type}</span>${notnull?' NOT NULL':''}${def?' DEFAULT '+def:''}</div>`});
html+=`</div>`})}
else html='<div style="color:#555">No tables. Load sample data or create tables.</div>';
document.getElementById('schemaDisplay').innerHTML=html||'<div style="color:#555">No tables yet</div>'}
function showMessage(msg,type){document.getElementById('message').innerHTML=`<div class="message msg-${type}">${msg}</div>`}
function runQuery(){
const sql=document.getElementById('sqlInput').value.trim();if(!sql){toast('Enter a query');return}
try{const results=db.exec(sql);if(results.length){
lastResults=results[0];const cols=lastResults.columns;const rows=lastResults.values;
let html='<table class="results-table"><thead><tr>'+cols.map(c=>`<th>${c}</th>`).join('')+'</tr></thead><tbody>'+rows.map(r=>'<tr>'+r.map(v=>`<td>${v===null?'<span style="color:#555">NULL</span>':v}</td>`).join('')+'</tr>').join('')+'</tbody></table>';
document.getElementById('resultsWrap').innerHTML=html;showMessage(`${rows.length} row(s) returned`,'success')}
else{lastResults=[];document.getElementById('resultsWrap').innerHTML='<div style="color:#555;text-align:center;padding:20px">Query executed (no results)</div>';showMessage('Query executed successfully','success');showSchema()}}
catch(e){showMessage('Error: '+e.message,'error');lastResults=[];document.getElementById('resultsWrap').innerHTML=''}}
function loadSampleData(){
try{db.run(`CREATE TABLE IF NOT EXISTS users (id INTEGER PRIMARY KEY, name TEXT NOT NULL, email TEXT UNIQUE, age INTEGER, city TEXT);
CREATE TABLE IF NOT EXISTS orders (id INTEGER PRIMARY KEY, user_id INTEGER REFERENCES users(id), product TEXT, amount REAL, created_at TEXT);`);
db.run(`INSERT OR IGNORE INTO users VALUES (1,'Alice Smith','alice@example.com',28,'New York'),(2,'Bob Jones','bob@example.com',35,'London'),(3,'Carol White','carol@example.com',22,'Tokyo'),(4,'David Brown','david@example.com',41,'Paris'),(5,'Eve Davis','eve@example.com',30,'Sydney');
INSERT OR IGNORE INTO orders VALUES (1,1,'Laptop',999.99,'2024-01-15'),(2,1,'Mouse',29.99,'2024-01-15'),(3,2,'Keyboard',79.99,'2024-02-10'),(4,3,'Monitor',399.99,'2024-03-01'),(5,5,'Headphones',199.99,'2024-03-15');`);
showSchema();toast('Sample data loaded');runQuery()}
catch(e){showMessage('Error: '+e.message,'error')}}
function clearDB(){db.run("SELECT name FROM sqlite_master WHERE type='table'").forEach(r=>{try{db.run(`DROP TABLE ${r[0]}`)}catch(e){}});showSchema();document.getElementById('resultsWrap').innerHTML='<div style="color:#555;text-align:center;padding:20px">Database cleared</div>';toast('Database cleared')}
function exportResults(){
if(!lastResults.length){toast('No results');return}const csv=lastResults.columns.join(',')+'\n'+lastResults.values.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='query-results.csv';a.click();toast('Exported')}
document.addEventListener('keydown',e=>{if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();runQuery()}});
initDB();
</script>
</body>
</html>
