<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Unicode Table</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f5f5;color:#333}
.header{background:#fff;padding:16px 24px;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.header a{color:#FF6B00;text-decoration:none;font-weight:600}
.header h1{font-size:20px;font-weight:700}
.header .icon{font-size:24px}
.container{max-width:900px;margin:24px auto;padding:0 16px}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card h2{font-size:16px;font-weight:600;margin-bottom:12px}
input[type=text]{width:100%;padding:10px 14px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px}
input[type=text]:focus{outline:2px solid #FF6B00}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.filter-btn{padding:6px 14px;border:2px solid #e0e0e0;border-radius:20px;background:#fff;font-size:12px;font-weight:600;cursor:pointer}
.filter-btn.active{border-color:#FF6B00;background:#FF6B00;color:#fff}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;max-height:500px;overflow-y:auto;padding:8px;background:#f8f8f8;border-radius:8px}
.char-card{background:#fff;border-radius:8px;padding:8px;text-align:center;cursor:pointer;border:2px solid transparent;transition:.2s}
.char-card:hover{border-color:#FF6B00;transform:scale(1.05)}
.char-big{font-size:28px;display:block;line-height:1.2}
.char-code{font-size:10px;color:#666;font-family:monospace}
.char-name{font-size:9px;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.detail-panel{background:#f8f8f8;border-radius:8px;padding:16px;margin-top:12px}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.detail-item{background:#fff;border-radius:6px;padding:8px}
.detail-label{font-size:11px;color:#666;font-weight:600}
.detail-value{font-size:14px;font-family:monospace;word-break:break-all}
.copy-inline{cursor:pointer;color:#FF6B00;font-size:11px}
.toast{position:fixed;bottom:24px;right:24px;background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:1000;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header"><a href="/">← Home</a><span class="icon">🔠</span><h1>Unicode Table</h1></div>
<div class="container">
<div class="card">
<h2>Search Unicode Characters</h2>
<input type="text" id="search" placeholder="Search by name or codepoint (e.g. 'heart', '0x2764')..." oninput="renderGrid()">
<div class="filters" id="filters"></div>
</div>
<div class="card">
<div id="detail" class="detail-panel" style="display:none"></div>
<div class="grid" id="grid"></div>
<div style="margin-top:8px;font-size:12px;color:#666" id="count"></div>
</div>
</div>
<div id="toast" class="toast"></div>
<script>
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
const allChars=[
// Arrows
{cp:0x2190,name:'LEFTWARDS ARROW',cat:'arrows'},{cp:0x2191,name:'UPWARDS ARROW',cat:'arrows'},
{cp:0x2192,name:'RIGHTWARDS ARROW',cat:'arrows'},{cp:0x2193,name:'DOWNWARDS ARROW',cat:'arrows'},
{cp:0x2194,name:'LEFT RIGHT ARROW',cat:'arrows'},{cp:0x2195,name:'UP DOWN ARROW',cat:'arrows'},
{cp:0x2196,name:'NORTH WEST ARROW',cat:'arrows'},{cp:0x2197,name:'NORTH EAST ARROW',cat:'arrows'},
{cp:0x2198,name:'SOUTH EAST ARROW',cat:'arrows'},{cp:0x2199,name:'SOUTH WEST ARROW',cat:'arrows'},
{cp:0x25B6,name:'BLACK RIGHT-POINTING TRIANGLE',cat:'arrows'},
{cp:0x25C0,name:'BLACK LEFT-POINTING TRIANGLE',cat:'arrows'},
{cp:0x25BC,name:'BLACK DOWN-POINTING TRIANGLE',cat:'arrows'},
{cp:0x25B2,name:'BLACK UP-POINTING TRIANGLE',cat:'arrows'},
// Math symbols
{cp:0x2200,name:'FOR ALL',cat:'math'},{cp:0x2202,name:'PARTIAL DIFFERENTIAL',cat:'math'},
{cp:0x2203,name:'THERE EXISTS',cat:'math'},{cp:0x2205,name:'EMPTY SET',cat:'math'},
{cp:0x2207,name:'NABLA',cat:'math'},{cp:0x2208,name:'ELEMENT OF',cat:'math'},
{cp:0x221A,name:'SQUARE ROOT',cat:'math'},{cp:0x221E,name:'INFINITY',cat:'math'},
{cp:0x2220,name:'ANGLE',cat:'math'},{cp:0x222B,name:'INTEGRAL',cat:'math'},
{cp:0x2248,name:'ALMOST EQUAL TO',cat:'math'},{cp:0x2260,name:'NOT EQUAL TO',cat:'math'},
{cp:0x2264,name:'LESS-THAN OR EQUAL TO',cat:'math'},{cp:0x2265,name:'GREATER-THAN OR EQUAL TO',cat:'math'},
{cp:0x00B1,name:'PLUS-MINUS SIGN',cat:'math'},{cp:0x00D7,name:'MULTIPLICATION SIGN',cat:'math'},
{cp:0x00F7,name:'DIVISION SIGN',cat:'math'},{cp:0x2261,name:'IDENTICAL TO',cat:'math'},
// Misc symbols
{cp:0x2605,name:'BLACK STAR',cat:'symbols'},{cp:0x2606,name:'WHITE STAR',cat:'symbols'},
{cp:0x2660,name:'BLACK SPADE SUIT',cat:'symbols'},{cp:0x2663,name:'BLACK CLUB SUIT',cat:'symbols'},
{cp:0x2665,name:'BLACK HEART SUIT',cat:'symbols'},{cp:0x2666,name:'BLACK DIAMOND SUIT',cat:'symbols'},
{cp:0x2713,name:'CHECK MARK',cat:'symbols'},{cp:0x2717,name:'BALLOT X',cat:'symbols'},
{cp:0x2714,name:'HEAVY CHECK MARK',cat:'symbols'},{cp:0x2718,name:'HEAVY BALLOT X',cat:'symbols'},
{cp:0x26A0,name:'WARNING SIGN',cat:'symbols'},{cp:0x26A1,name:'HIGH VOLTAGE SIGN',cat:'symbols'},
{cp:0x26AA,name:'MEDIUM WHITE CIRCLE',cat:'symbols'},{cp:0x26AB,name:'MEDIUM BLACK CIRCLE',cat:'symbols'},
// Emoji
{cp:0x1F600,name:'GRINNING FACE',cat:'emoji'},{cp:0x1F601,name:'BEAMING FACE',cat:'emoji'},
{cp:0x1F602,name:'FACE WITH TEARS OF JOY',cat:'emoji'},{cp:0x1F603,name:'SMILING FACE',cat:'emoji'},
{cp:0x1F605,name:'SMILING FACE WITH SWEAT',cat:'emoji'},{cp:0x1F606,name:'SMILING FACE WITH HEARTS',cat:'emoji'},
{cp:0x1F609,name:'WINKING FACE',cat:'emoji'},{cp:0x1F60A,name:'SMILING FACE WITH HEART-EYES',cat:'emoji'},
{cp:0x1F60B,name:'FACE SAVORING FOOD',cat:'emoji'},{cp:0x1F60D,name:'HEART EYES',cat:'emoji'},
{cp:0x1F60E,name:'SMILING FACE WITH SUNGLASSES',cat:'emoji'},{cp:0x1F60F,name:'SMIRKING FACE',cat:'emoji'},
{cp:0x1F612,name:'UNAMUSED FACE',cat:'emoji'},{cp:0x1F614,name:'PENSIVE FACE',cat:'emoji'},
{cp:0x1F616,name:'CONFOUNDED FACE',cat:'emoji'},{cp:0x1F618,name:'FACE THROWING A KISS',cat:'emoji'},
{cp:0x1F61C,name:'WINKING FACE WITH TONGUE',cat:'emoji'},{cp:0x1F61D,name:'SQUINTING FACE WITH TONGUE',cat:'emoji'},
{cp:0x1F61E,name:'DISAPPOINTED FACE',cat:'emoji'},{cp:0x1F620,name:'ANGRY FACE',cat:'emoji'},
{cp:0x1F621,name:'POUTING FACE',cat:'emoji'},{cp:0x1F622,name:'CRYING FACE',cat:'emoji'},
{cp:0x1F623,name:'PERSEVERING FACE',cat:'emoji'},{cp:0x1F624,name:'CONFOUNDED FACE',cat:'emoji'},
{cp:0x1F625,name:'DISAPPOINTED BUT RELIEVED FACE',cat:'emoji'},
{cp:0x1F628,name:'FEARFUL FACE',cat:'emoji'},{cp:0x1F629,name:'WEARY FACE',cat:'emoji'},
{cp:0x1F62A,name:'SLEEPY FACE',cat:'emoji'},{cp:0x1F62B,name:'TIRED FACE',cat:'emoji'},
{cp:0x1F62D,name:'LOUDLY CRYING FACE',cat:'emoji'},{cp:0x1F630,name:'FACE WITH COLD SWEAT',cat:'emoji'},
{cp:0x1F631,name:'FACE SCREAMING IN FEAR',cat:'emoji'},{cp:0x1F632,name:'ASTONISHED FACE',cat:'emoji'},
{cp:0x1F633,name:'FLUSHED FACE',cat:'emoji'},{cp:0x1F635,name:'DIZZY FACE',cat:'emoji'},
{cp:0x1F637,name:'FACE WITH MEDICAL MASK',cat:'emoji'},
{cp:0x1F44D,name:'THUMBS UP',cat:'emoji'},{cp:0x1F44E,name:'THUMBS DOWN',cat:'emoji'},
{cp:0x1F44A,name:'ONCOMING FIST',cat:'emoji'},{cp:0x1F44B,name:'WAVING HAND',cat:'emoji'},
{cp:0x1F44F,name:'CLAPPING HANDS',cat:'emoji'},{cp:0x1F450,name:'OPEN HANDS',cat:'emoji'},
{cp:0x1F389,name:'PARTY POPPER',cat:'emoji'},{cp:0x1F38A,name:'CONFETTI BALL',cat:'emoji'},
{cp:0x1F4AF,name:'HUNDRED POINTS',cat:'emoji'},{cp:0x1F525,name:'FIRE',cat:'emoji'},
{cp:0x1F4A9,name:'PILE OF POO',cat:'emoji'},{cp:0x1F4A4,name:'SNORING',cat:'emoji'},
{cp:0x1F4A5,name:'COLLISION',cat:'emoji'},{cp:0x1F4A9,name:'DROPLET',cat:'emoji'},
// Punctuation
{cp:0x2026,name:'HORIZONTAL ELLIPSIS',cat:'symbols'},{cp:0x2014,name:'EM DASH',cat:'symbols'},
{cp:0x2013,name:'EN DASH',cat:'symbols'},{cp:0x2018,name:'LEFT SINGLE QUOTATION',cat:'symbols'},
{cp:0x2019,name:'RIGHT SINGLE QUOTATION',cat:'symbols'},{cp:0x201C,name:'LEFT DOUBLE QUOTATION',cat:'symbols'},
{cp:0x201D,name:'RIGHT DOUBLE QUOTATION',cat:'symbols'},{cp:0x00A9,name:'COPYRIGHT SIGN',cat:'symbols'},
{cp:0x00AE,name:'REGISTERED SIGN',cat:'symbols'},{cp:0x2122,name:'TRADE MARK SIGN',cat:'symbols'},
{cp:0x00A0,name:'NO-BREAK SPACE',cat:'symbols'},
// Cyrillic
{cp:0x0410,name:'CYRILLIC CAPITAL LETTER A',cat:'symbols'},{cp:0x0411,name:'CYRILLIC CAPITAL LETTER BE',cat:'symbols'},
// Greek
{cp:0x0391,name:'GREEK CAPITAL LETTER ALPHA',cat:'symbols'},{cp:0x0392,name:'GREEK CAPITAL LETTER BETA',cat:'symbols'},
{cp:0x0394,name:'GREEK CAPITAL LETTER DELTA',cat:'symbols'},{cp:0x03A0,name:'GREEK CAPITAL LETTER PI',cat:'symbols'},
{cp:0x03A3,name:'GREEK CAPITAL LETTER SIGMA',cat:'symbols'},{cp:0x03A9,name:'GREEK CAPITAL LETTER OMEGA',cat:'symbols'},
{cp:0x03B1,name:'GREEK SMALL LETTER ALPHA',cat:'symbols'},{cp:0x03B2,name:'GREEK SMALL LETTER BETA',cat:'symbols'},
{cp:0x03B4,name:'GREEK SMALL LETTER DELTA',cat:'symbols'},{cp:0x03B8,name:'GREEK SMALL LETTER THETA',cat:'symbols'},
{cp:0x03C0,name:'GREEK SMALL LETTER PI',cat:'symbols'},{cp:0x03C9,name:'GREEK SMALL LETTER OMEGA',cat:'symbols'},
];
let activeCat='all';
const catLabels={all:'All',arrows:'↗️ Arrows',math:'∑ Math',symbols:'★ Symbols',emoji:'😀 Emoji'};
document.getElementById('filters').innerHTML=Object.entries(catLabels).map(([k,v])=>`<button class="filter-btn${k==='all'?' active':''}" data-f="${k}" onclick="setCat('${k}')">${v}</button>`).join('');
function setCat(c){activeCat=c;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.f===c));renderGrid()}
function renderGrid(){
const q=document.getElementById('search').value.toLowerCase();
let filtered=activeCat==='all'?allChars:allChars.filter(c=>c.cat===activeCat);
if(q)filtered=filtered.filter(c=>c.name.toLowerCase().includes(q)||('0x'+c.cp.toString(16).toUpperCase()).includes(q)||c.cp.toString().includes(q));
const grid=document.getElementById('grid');
grid.innerHTML=filtered.map(c=>{
const ch=String.fromCodePoint(c.cp);
return`<div class="char-card" onclick="showDetail(${c.cp})"><span class="char-big">${ch}</span><span class="char-code">U+${c.cp.toString(16).toUpperCase().padStart(4,'0')}</span></div>`;
}).join('');
document.getElementById('count').textContent=`Showing ${filtered.length} characters`;
document.getElementById('detail').style.display='none';
}
function showDetail(cp){
const ch=String.fromCodePoint(cp);
const item=allChars.find(c=>c.cp===cp)||{name:'Unknown',cat:''};
const html=`
<h2 style="margin-bottom:8px">${ch} <span style="font-size:14px;color:#666">${item.name}</span></h2>
<div class="detail-grid">
<div class="detail-item"><div class="detail-label">Codepoint</div><div class="detail-value">${cp} (0x${cp.toString(16).toUpperCase()})</div></div>
<div class="detail-item"><div class="detail-label">HTML Entity (named)</div><div class="detail-value" onclick="copy('&#${cp};')">&#${cp}; <span class="copy-inline">📋</span></div></div>
<div class="detail-item"><div class="detail-label">HTML Entity (hex)</div><div class="detail-value" onclick="copy('&#x${cp.toString(16).toUpperCase()};')">&#x${cp.toString(16).toUpperCase()}; <span class="copy-inline">📋</span></div></div>
<div class="detail-item"><div class="detail-label">JS Escape</div><div class="detail-value" onclick="copy('\\\\u${cp.toString(16).toUpperCase().padStart(4,'0')}')">\\u${cp.toString(16).toUpperCase().padStart(4,'0')} <span class="copy-inline">📋</span></div></div>
<div class="detail-item"><div class="detail-label">JS (Code Point)</div><div class="detail-value" onclick="copy('\\\\u{${cp.toString(16).toUpperCase()}}')">\\u{${cp.toString(16).toUpperCase()}} <span class="copy-inline">📋</span></div></div>
<div class="detail-item"><div class="detail-label">Character</div><div class="detail-value" onclick="copy('${ch}')">${ch} <span class="copy-inline">📋</span></div></div>
<div class="detail-item"><div class="detail-label">UTF-8 Bytes</div><div class="detail-value">${new TextEncoder().encode(ch).map(b=>'0x'+b.toString(16).toUpperCase().padStart(2,'0')).join(' ')}</div></div>
<div class="detail-item"><div class="detail-label">Category</div><div class="detail-value">${item.cat}</div></div>
</div>`;
document.getElementById('detail').innerHTML=html;
document.getElementById('detail').style.display='block';
}
function copy(v){navigator.clipboard.writeText(v).then(()=>toast('Copied!'))}
renderGrid();
</script>
</body>
</html>
