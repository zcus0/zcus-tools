function normalizeMac(mac){
const clean=mac.replace(/[:-]/g,'').replace(/\./g,'').toUpperCase();
if(clean.length!==12)return null;
return clean.match(/.{2}/g).join(':');
}

function getOui(mac){
const prefix=mac.substring(0,8).toUpperCase();
return OUI_DB[prefix]||null;
}

function lookup(){
const raw=document.getElementById('mac').value.trim();
const mac=normalizeMac(raw);
if(!mac){
document.getElementById('results').innerHTML='<div class="card"><div class="error-msg">❌ Invalid MAC address format. Use AA:BB:CC:DD:EE:FF</div></div>';
return;
}
const vendor=getOui(mac);
const prefix=mac.substring(0,8).toUpperCase();
const isUnicast=(parseInt(mac.charAt(1),16)&1)===0;
const isLocal=(parseInt(mac.charAt(1),16)&2)===0;
const octets=mac.split(':');
let html=`<div class="card"><h2>Lookup Result</h2>
<div class="result-card">
<div class="field"><span class="field-key">MAC Address</span><span class="field-val">${mac}</span></div>
<div class="field"><span class="field-key">OUI Prefix</span><span class="field-val">${prefix}</span></div>
<div class="field"><span class="field-key">Vendor</span><span class="field-val">${vendor?'<span class="badge badge-green">'+vendor+'</span>':'<span class="badge badge-yellow">Unknown</span>'}</span></div>
<div class="field"><span class="field-key">Type</span><span class="field-val">${isUnicast?'Unicast':'Multicast'}</span></div>
<div class="field"><span class="field-key">Scope</span><span class="field-val">${isLocal?'Globally Unique (Universal)':'Locally Administered'}</span></div>
<div class="field"><span class="field-key">Binary</span><span class="field-val" style="font-size:11px">${octets.map(o=>parseInt(o,16).toString(2).padStart(8,'0')).join(' ')}</span></div>
</div>`;
if(vendor){
html+=`<div style="padding:8px 0"><span class="badge badge-blue">IEEE OUI: ${prefix}</span> <span class="badge badge-green">Verified Vendor</span></div>`;
}
html+=`</div>`;
document.getElementById('results').innerHTML=html;
}

function quickLookup(mac){document.getElementById('mac').value=mac;lookup()}
