<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Social Media Counter</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f5f5f5;color:#333}
.header{background:#fff;padding:16px 24px;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.header a{color:#FF6B00;text-decoration:none;font-weight:600}
.header h1{font-size:20px;font-weight:700}
.header .icon{font-size:24px}
.container{max-width:800px;margin:24px auto;padding:0 16px}
.card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.card h2{font-size:16px;font-weight:600;margin-bottom:12px}
textarea{width:100%;height:180px;border:1px solid #e0e0e0;border-radius:8px;padding:12px;font-size:14px;resize:vertical;line-height:1.6}
textarea:focus{outline:2px solid #FF6B00;border-color:#FF6B00}
.platforms{display:grid;gap:16px}
.platform-card{background:#f8f8f8;border-radius:12px;padding:16px}
.platform-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.platform-name{font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px}
.platform-limit{font-size:13px;color:#666}
.platform-count{font-weight:700;font-size:20px}
.progress-bar{height:10px;background:#e0e0e0;border-radius:5px;overflow:hidden;margin:8px 0}
.progress-fill{height:100%;border-radius:5px;transition:width .3s,background .3s}
.status-text{font-size:12px;font-weight:600}
.toast{position:fixed;bottom:24px;right:24px;background:#333;color:#fff;padding:12px 20px;border-radius:8px;font-size:14px;z-index:1000;opacity:0;transition:opacity .3s}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="header"><a href="/">← Home</a><span class="icon">📱</span><h1>Social Media Counter</h1></div>
<div class="container">
<div class="card">
<h2>Input Text</h2>
<textarea id="input" placeholder="Type or paste your post text here..." oninput="count()"></textarea>
<div style="display:flex;gap:16px;font-size:12px;color:#666;margin-top:8px">
<span>Characters: <strong id="charCount">0</strong></span>
<span>Words: <strong id="wordCount">0</strong></span>
</div>
</div>
<div class="card">
<h2>Character Limits</h2>
<div class="platforms" id="platforms"></div>
</div>
</div>
<div id="toast" class="toast"></div>
<script>
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
const platforms=[
{name:'Twitter / X',icon:'🐦',limit:280,color:'#1DA1F2'},
{name:'Instagram',icon:'📷',limit:2200,color:'#E4405F'},
{name:'LinkedIn',icon:'💼',limit:3000,color:'#0A66C2'},
{name:'Facebook',icon:'📘',limit:63206,color:'#1877F2'},
{name:'Mastodon',icon:'🐘',limit:500,color:'#6364FF'},
{name:'Bluesky',icon:'🦋',limit:300,color:'#0085FF'},
{name:'Threads',icon:'🧵',limit:500,color:'#000'},
{name:'Reddit',icon:'🔴',limit:40000,color:'#FF4500'},
];
function count(){
const text=document.getElementById('input').value;
const chars=text.length;
const words=text.trim()?text.trim().split(/\s+/).length:0;
document.getElementById('charCount').textContent=chars;
document.getElementById('wordCount').textContent=words;
document.getElementById('platforms').innerHTML=platforms.map(p=>{
const remaining=p.limit-chars;
const pct=Math.min(100,(chars/p.limit)*100);
const over=chars>p.limit;
const near=chars>p.limit*0.9&&!over;
let color=p.color;
if(over)color='#e74c3c';
else if(near)color='#f39c12';
const status=over?`❌ Over by ${Math.abs(remaining)}`:near?`⚠️ ${remaining} left`:`✅ ${remaining} left`;
return`<div class="platform-card">
<div class="platform-header">
<span class="platform-name">${p.icon} ${p.name}</span>
<span class="platform-count" style="color:${color}">${chars} / ${p.limit}</span>
</div>
<div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${color}"></div></div>
<div class="status-text" style="color:${color}">${status}</div>
</div>`;
}).join('');
}
count();
</script>
</body>
</html>
